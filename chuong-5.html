    <style>

        .main-menu {

        .menu-link {

            background: white;

        .content {

        .info-value {

            font-weight: bold;
            color: #333;
        }

        .progress-bar {
            width: 100%;

            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {

            background: linear-gradient(90deg, #667eea, #764ba2);

        }

        .question-item {
            margin-bottom: 25px;

            background: #f9f9f9;
            border-radius: 8px;

        .question-item.answered {

            border-left-color: #f44336;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            padding: 12px 15px;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-container.show {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .score-circle.excellent { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); }
        .score-circle.good { background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%); }
        .score-circle.fair { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); }
        .score-circle.poor { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }

        .results-message {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .results-details {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .wrong-answers {
            text-align: left;
            background: #fff7f7;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 18px;
        }

        .wrong-answers h3 {
            font-size: 18px;
            color: #b71c1c;
            margin-bottom: 12px;
        }

        .wrong-item {
            padding: 10px 0;
            border-bottom: 1px dashed #f0b4b4;
            line-height: 1.5;
            color: #333;
        }

        .wrong-item:last-child {
            border-bottom: none;
        }

        .wrong-item strong {
            color: #c62828;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 21px;
            }

            .content {
                padding: 20px;
            }

            .quiz-info {
                flex-direction: column;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .buttons-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>

<body>
    <div class="container">
        <div class="header">
            <h1>Chương 5 - Trắc nghiệm thanh toán quốc tế</h1>

        <div class="content">
            <div class="quiz-info">

                    <span class="info-label">Câu hỏi</span>

                <div class="info-item">
                    <span class="info-label">Câu sai</span>
                    <span class="info-value" style="color: #f44336;" id="incorrect-count">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Tỷ lệ</span>
                    <span class="info-value" id="percentage">0%</span>

            <div class="buttons-container">

                <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()">Nộp bài</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { question: 'Phương thức nhờ thu (Collection) trong thương mại quốc tế là:', options: ['Người bán ủy thác ngân hàng thu hộ tiền từ người mua dựa trên bộ chứng từ và chỉ thị nhờ thu', 'Ngân hàng cam kết thanh toán vô điều kiện như L/C', 'Người mua chuyển tiền trực tiếp không qua ngân hàng', 'Chỉ áp dụng cho giao dịch nội địa'], answer: 0 },
            { question: 'Quy tắc quốc tế điều chỉnh nghiệp vụ nhờ thu hiện hành là:', options: ['UCP 600', 'URC 522', 'Incoterms 2020', 'ISBP 745'], answer: 1 },
            { question: 'Trong nhờ thu chứng từ, D/P là viết tắt của:', options: ['Delivery against Payment advice', 'Documents against Protest', 'Documents against Payment', 'Demand for Payment'], answer: 2 },
            { question: 'Trong nhờ thu chứng từ, D/A là viết tắt của:', options: ['Draft against Approval', 'Documents against Advice', 'Delivery against Acceptance note', 'Documents against Acceptance'], answer: 3 },
            { question: 'Điểm khác biệt cốt lõi giữa D/P và D/A là:', options: ['D/P giao chứng từ khi trả tiền, D/A giao chứng từ khi chấp nhận hối phiếu kỳ hạn', 'D/P giao chứng từ khi người mua ký chấp nhận hối phiếu, D/A giao khi trả tiền ngay', 'Cả hai đều yêu cầu trả tiền ngay', 'Cả hai đều do ngân hàng bảo lãnh thanh toán'], answer: 0 },
            { question: 'Trong quy trình nhờ thu, Remitting Bank là:', options: ['Ngân hàng của người mua trả tiền cho mọi trường hợp', 'Ngân hàng của người bán nhận ủy thác và gửi bộ chứng từ đi nhờ thu', 'Ngân hàng trung ương', 'Ngân hàng phát hành L/C'], answer: 1 },
            { question: 'Presenting/Collecting Bank là ngân hàng:', options: ['Bảo hiểm hàng hóa', 'Phát hành vận đơn', 'Nhận chứng từ từ remitting bank để xuất trình cho người trả tiền', 'Giám định chất lượng'], answer: 2 },
            { question: 'Trong URC 522, ngân hàng xử lý chứng từ theo nguyên tắc:', options: ['Bắt buộc kiểm tra chất lượng hàng trước khi giao chứng từ', 'Chịu trách nhiệm pháp lý về nội dung thực của hàng hóa', 'Luôn phải ứng trước tiền cho người bán', 'Hành động theo chỉ thị nhờ thu và không bảo đảm thanh toán trừ khi có cam kết riêng'], answer: 3 },
            { question: 'Trách nhiệm cốt lõi của ngân hàng xuất trình theo URC 522 là:', options: ['Xuất trình chứng từ theo đúng chỉ thị nhờ thu và thông báo kết quả kịp thời', 'Kiểm tra hàng thực tế so với hợp đồng', 'Bảo đảm người mua sẽ thanh toán đúng hạn', 'Tự thay đổi điều kiện D/P thành D/A khi cần'], answer: 0 },
            { question: 'Trong nhờ thu, drawee thường là:', options: ['Người xuất khẩu', 'Người nhập khẩu/người trả tiền', 'Ngân hàng remitting', 'Hãng tàu'], answer: 1 },
            { question: 'Trong nhờ thu, drawer thường là:', options: ['Ngân hàng trung gian', 'Người mua', 'Người bán ký phát hối phiếu', 'Công ty bảo hiểm'], answer: 2 },
            { question: 'Nhờ thu trơn (Clean Collection) là nhờ thu:', options: ['Không dùng hối phiếu', 'Kèm chứng từ thương mại đầy đủ', 'Chỉ áp dụng cho L/C', 'Chỉ nhờ thu chứng từ tài chính, không kèm chứng từ thương mại'], answer: 3 },
            { question: 'Nhờ thu kèm chứng từ (Documentary Collection) thường bao gồm:', options: ['Chứng từ tài chính có thể kèm chứng từ thương mại', 'Chỉ email xác nhận đơn hàng', 'Chỉ chứng từ bảo hiểm', 'Chỉ giấy kiểm dịch'], answer: 0 },
            { question: 'Ưu điểm thường thấy của nhờ thu so với L/C là:', options: ['Mức bảo đảm thanh toán luôn cao hơn L/C', 'Chi phí thường thấp hơn và quy trình ít phức tạp hơn', 'Không cần chứng từ', 'Không có rủi ro cho người bán'], answer: 1 },
            { question: 'Nhược điểm chính của D/A đối với nhà xuất khẩu là:', options: ['Không thể dùng hối phiếu kỳ hạn', 'Phí ngân hàng quá cao bắt buộc', 'Người mua có thể nhận chứng từ/hàng trước nhưng đến hạn không thanh toán', 'Luôn bị hải quan giữ hàng'], answer: 2 },
            { question: 'Với D/P, người nhập khẩu nhận chứng từ khi nào?', options: ['Sau khi người bán gửi email đồng ý', 'Sau khi ký chấp nhận hối phiếu kỳ hạn', 'Ngay khi chứng từ đến ngân hàng xuất trình', 'Sau khi thanh toán theo điều kiện nhờ thu'], answer: 3 },
            { question: 'Với D/A, người nhập khẩu nhận chứng từ khi nào?', options: ['Sau khi chấp nhận hối phiếu kỳ hạn', 'Chỉ sau khi trả tiền ngay', 'Sau khi ngân hàng bảo lãnh', 'Sau khi có xác nhận hải quan'], answer: 0 },
            { question: 'Trong URC 522, ngân hàng có trách nhiệm pháp lý về hình thức, đủ bản, hiệu lực chứng từ như thế nào?', options: ['Chịu trách nhiệm toàn bộ', 'Không chịu trách nhiệm về hình thức, tính xác thực hay hiệu lực pháp lý của chứng từ', 'Chịu trách nhiệm khi người mua yêu cầu', 'Chỉ chịu trách nhiệm với vận đơn'], answer: 1 },
            { question: 'Nếu người mua từ chối thanh toán D/P, ngân hàng xuất trình nên:', options: ['Tự trả lại tiền cho người bán', 'Tự bán hàng để thu nợ', 'Thông báo từ chối kịp thời cho ngân hàng nhờ thu và chờ chỉ thị tiếp', 'Giao chứng từ cho người mua để giữ quan hệ'], answer: 2 },
            { question: 'Trong D/P, nếu người mua chưa thanh toán thì nguyên tắc giao chứng từ là:', options: ['Tự động đổi sang D/A', 'Có thể giao trước một phần bản gốc', 'Luôn giao bản copy trước', 'Không giao chứng từ trừ khi có chỉ thị đặc biệt từ ngân hàng nhờ thu/người ủy thác'], answer: 3 },
            { question: 'Hối phiếu kỳ hạn trong D/A có chức năng chính:', options: ['Ghi nhận cam kết thanh toán vào ngày đáo hạn', 'Làm chứng từ bảo hiểm', 'Thay thế hợp đồng ngoại thương', 'Chứng minh nguồn gốc hàng hóa'], answer: 0 },
            { question: 'Trong nhờ thu, rủi ro quốc gia/chính trị tác động thế nào?', options: ['Không ảnh hưởng', 'Có thể làm chậm hoặc cản trở chuyển tiền/thanh toán xuyên biên giới', 'Chỉ ảnh hưởng L/C', 'Chỉ ảnh hưởng vận tải'], answer: 1 },
            { question: 'Nếu người mua phá sản sau khi đã chấp nhận hối phiếu D/A, bên chịu rủi ro thu tiền chính là:', options: ['Ngân hàng nhờ thu', 'Ngân hàng xuất trình', 'Người bán', 'Hãng tàu'], answer: 2 },
            { question: 'Vì sao nhiều nhà xuất khẩu vẫn dùng D/P thay vì D/A với khách hàng mới?', options: ['D/P không cần chứng từ vận tải', 'D/P cho phép người mua nhận hàng trước khi trả tiền', 'D/P luôn có bảo lãnh ngân hàng', 'D/P giúp kiểm soát chứng từ tốt hơn vì yêu cầu trả tiền trước khi nhận chứng từ'], answer: 3 },
            { question: 'Chọn nhận định đúng về vai trò ngân hàng trong nhờ thu:', options: ['Ngân hàng là đại lý thu hộ theo chỉ thị, không thay thế nghĩa vụ thanh toán của người mua', 'Ngân hàng là người mua hàng hóa', 'Ngân hàng luôn bảo lãnh thanh toán', 'Ngân hàng quyết định điều khoản hợp đồng thương mại'], answer: 0 },
            { question: 'Một biện pháp giảm rủi ro cho nhà xuất khẩu khi dùng nhờ thu là:', options: ['Giao dịch với bất kỳ đối tác nào không cần thẩm định', 'Chọn D/P, thẩm định tín nhiệm người mua, và quy định điều khoản xử lý từ chối rõ ràng', 'Luôn bỏ qua điều khoản tranh chấp', 'Chỉ nhận thỏa thuận miệng'], answer: 1 },
            { question: 'Trong nhờ thu, chi phí phát sinh thường do:', options: ['Luôn do ngân hàng nhờ thu chịu', 'Một bên duy nhất chịu bắt buộc theo URC 522', 'Theo thỏa thuận hợp đồng và chỉ thị nhờ thu giữa các bên', 'Không có phí'], answer: 2 },
            { question: 'Trường hợp nào sau đây là nhờ thu trơn?', options: ['Chuyển tiền T/T trả trước', 'Thu hộ bộ chứng từ gồm B/L, invoice, packing list', 'Bộ chứng từ theo L/C có xác nhận', 'Thu hộ hối phiếu không kèm vận đơn/hóa đơn thương mại'], answer: 3 },
            { question: 'Trong nhờ thu kèm chứng từ, chứng từ nào thường quyết định quyền nhận hàng?', options: ['Vận đơn gốc theo điều kiện giao hàng phù hợp', 'Giấy giới thiệu nội bộ', 'Phiếu chấm công', 'Bảng báo giá cũ'], answer: 0 },
            { question: 'Nếu người nhập khẩu từ chối thanh toán do giá thị trường giảm mạnh (D/P), theo URC 522 ngân hàng xuất trình nên:', options: ['Bắt buộc người mua thanh toán bằng mọi giá', 'Thông báo từ chối và chờ chỉ thị từ ngân hàng nhờ thu/người ủy thác', 'Tự động giao chứng từ để giảm thiệt hại', 'Tự kiện thay người bán'], answer: 1 },
            { question: 'Một giới hạn trách nhiệm của ngân hàng trong nhờ thu là:', options: ['Chịu trách nhiệm khả năng thanh toán của người mua', 'Chịu trách nhiệm chất lượng hàng hóa', 'Không chịu trách nhiệm về hàng hóa thực tế', 'Chịu trách nhiệm biến động tỷ giá cho người bán'], answer: 2 },

            { question: 'Trong tranh chấp nhờ thu, điều khoản nào trong hợp đồng giúp xử lý pháp lý rõ hơn?', options: ['Điều khoản quảng cáo', 'Điều khoản luật áp dụng và cơ chế giải quyết tranh chấp', 'Điều khoản màu bao bì', 'Điều khoản thưởng doanh số'], answer: 1 },
            { question: 'Đối với nhà nhập khẩu, ưu điểm của D/A là:', options: ['Không cần chấp nhận hối phiếu', 'Phải trả tiền trước khi nhận chứng từ', 'Có thể nhận chứng từ/hàng và được hưởng tín dụng thương mại đến ngày đáo hạn', 'Không có nghĩa vụ thanh toán khi đến hạn'], answer: 2 },
            { question: 'Tình huống: VinaAgri xuất khẩu theo D/A 60 ngày, người mua đã chấp nhận hối phiếu và nhận hàng nhưng sau đó phá sản trước ngày đáo hạn. Nhận định đúng nhất là:', options: ['Hối phiếu mất hiệu lực ngay khi người mua phá sản', 'Ngân hàng xuất trình bắt buộc phải thanh toán thay người mua', 'Giao dịch tự động chuyển thành L/C', 'Rủi ro tín dụng thuộc về nhà xuất khẩu trong D/A nếu không có bảo lãnh riêng'], answer: 3 },
            { question: 'Tình huống: Lệnh nhờ thu ghi D/P, nhưng ngân hàng xuất trình giao chứng từ khi người mua mới hứa sẽ trả sau. Điều này là:', options: ['Vi phạm chỉ thị nhờ thu D/P nếu không có ủy quyền sửa đổi rõ ràng', 'Phù hợp thông lệ vì giúp thông quan nhanh', 'Không ảnh hưởng quyền lợi nhà xuất khẩu', 'Bắt buộc theo URC 522'], answer: 0 },
            { question: 'Tình huống: Người mua từ chối thanh toán D/P vì giá hàng giảm mạnh 30%. Hành động phù hợp của ngân hàng xuất trình là:', options: ['Tự giảm giá hàng và thu tiền', 'Thông báo từ chối cho remitting bank và chờ chỉ thị xử lý chứng từ/hàng', 'Khởi kiện người mua ngay thay người bán', 'Giao chứng từ cho người mua để tránh lưu kho'], answer: 1 },
            { question: 'Tình huống: Bộ chứng từ nhờ thu bị thất lạc trong quá trình chuyển phát giữa các ngân hàng. Theo nguyên tắc URC 522, ngân hàng:', options: ['Không cần thông báo cho các bên', 'Luôn chịu trách nhiệm bồi thường toàn bộ giá trị lô hàng', 'Không đương nhiên chịu trách nhiệm như người bảo hiểm hàng hóa; xử lý theo điều khoản trách nhiệm và thực tế tác nghiệp', 'Tự động coi giao dịch đã hoàn tất'], answer: 2 },
            { question: 'Tình huống: Nhà xuất khẩu giao dịch với khách hàng mới ở thị trường rủi ro cao, đang phân vân D/P hay D/A. Lựa chọn thận trọng hơn là:', options: ['Bỏ điều khoản xử lý từ chối', 'D/A dài ngày để tăng cạnh tranh', 'Giao hàng trước nhận tiền sau không điều kiện', 'D/P hoặc L/C nếu cần mức bảo đảm cao hơn'], answer: 3 },
            { question: 'Tình huống: Ngân hàng xuất trình đã nhận tiền từ người mua trong D/P nhưng chậm chuyển tiền về remitting bank không lý do. Nhận định đúng là:', options: ['Ngân hàng có nghĩa vụ xử lý, chuyển giao theo chỉ thị hợp lý và kịp thời', 'Không có vấn đề vì ngân hàng được quyền giữ tiền', 'Người bán không có quyền khiếu nại', 'URC 522 không điều chỉnh hành vi này'], answer: 0 },
            { question: 'Tình huống: Trong D/A, đến hạn người mua xin gia hạn thêm 90 ngày. Để an toàn pháp lý, nhà xuất khẩu nên:', options: ['Đồng ý miệng là đủ', 'Chỉ chấp nhận khi có sửa đổi thỏa thuận bằng văn bản và đánh giá lại rủi ro thu tiền', 'Bắt buộc đồng ý theo URC 522', 'Yêu cầu ngân hàng tự quyết thay mình'], answer: 1 },
            { question: 'Tình huống: Người nhập khẩu nhận chứng từ D/P rồi phát hiện chứng từ thương mại có sai sót nhỏ không ảnh hưởng nhận hàng. Cách tiếp cận phù hợp là:', options: ['Tự sửa chứng từ gốc', 'Từ chối ngay mọi thanh toán mà không thông báo', 'Trao đổi với người bán/ngân hàng để xử lý theo hợp đồng và chỉ thị, tránh vi phạm nghĩa vụ thanh toán tùy tiện', 'Giữ hàng và không thanh toán vĩnh viễn'], answer: 2 },
            { question: 'Tình huống: Hợp đồng quy định rõ D/P at sight, nhưng nhân viên mới của người nhập khẩu nhầm lẫn nghĩ là D/A nên chỉ ký chấp nhận hối phiếu. Kết luận đúng là:', options: ['Người nhập khẩu không còn nghĩa vụ nào', 'Ký chấp nhận trong D/P đương nhiên thay thế nghĩa vụ trả ngay', 'Ngân hàng phải tự chuyển sang D/A', 'Điều kiện gốc vẫn là D/P, cần xử lý theo đúng chỉ thị thu hoặc sửa đổi được các bên chấp thuận'], answer: 3 },
            { question: 'Tình huống: Doanh nghiệp muốn dùng nhờ thu nhưng vẫn giảm rủi ro không thanh toán ở mức cao hơn. Biện pháp kết hợp phù hợp là:', options: ['D/P, bảo hiểm tín dụng xuất khẩu hoặc bảo lãnh thanh toán khi cần, kèm điều khoản xử lý từ chối rõ ràng', 'Dùng D/A dài ngày và bỏ thẩm định đối tác', 'Chỉ dựa vào quan hệ quen biết', 'Không cần chứng từ vận tải gốc'], answer: 0 }
        ];

        let userAnswers = [];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((item, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.id = `question-${index}`;

                const numberDiv = document.createElement('div');
                numberDiv.className = 'question-number';
                numberDiv.textContent = `Câu ${index + 1}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'question-text';
                textDiv.textContent = item.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D'];
                item.options.forEach((option, optionIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = labels[optionIndex] + '. ' + option;
                    btn.onclick = () => selectAnswer(index, optionIndex);
                    btn.id = `option-${index}-${optionIndex}`;
                    optionsDiv.appendChild(btn);
                });

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.id = `feedback-${index}`;

                questionDiv.appendChild(numberDiv);
                questionDiv.appendChild(textDiv);
                questionDiv.appendChild(optionsDiv);
                questionDiv.appendChild(feedbackDiv);

                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;

            ['A', 'B', 'C', 'D'].forEach((_, i) => {
                const btn = document.getElementById(`option-${questionIndex}-${i}`);
                if (btn) {
                    if (i === optionIndex) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                }
            });

            document.getElementById(`question-${questionIndex}`).classList.add('answered');
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(ans => ans !== undefined).length;
            const total = quizData.length;
            const percent = Math.round((answered / total) * 100);

            document.getElementById('current-question').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function submitQuiz() {
            let correct = 0;
            let incorrect = 0;

            quizData.forEach((item, index) => {
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                const questionItem = document.getElementById(`question-${index}`);
                const labels = ['A', 'B', 'C', 'D'];
                const isCorrect = userAnswers[index] === item.answer;

                if (isCorrect) {
                    correct++;
                    const btn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (btn) btn.classList.add('correct');
                    feedbackDiv.className = 'feedback show correct';
                    feedbackDiv.textContent = 'Chính xác!';
                } else {
                    incorrect++;
                    const userBtn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (userBtn) userBtn.classList.add('incorrect');
                    const correctBtn = document.getElementById(`option-${index}-${item.answer}`);
                    if (correctBtn) correctBtn.classList.add('correct');
                    feedbackDiv.className = 'feedback show incorrect';
                    feedbackDiv.textContent = `Sai! Đáp án đúng là: ${labels[item.answer]}`;
                    questionItem.classList.add('incorrect');
                }
            });

            const percentage = Math.round((correct / quizData.length) * 100);
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('percentage').textContent = percentage + '%';

            showResults(correct, percentage);
        }

        function showResults(correct, percentage) {
            const resultsContainer = document.getElementById('results-container');
            const scoreCircle = document.getElementById('score-circle');
            const resultsMessage = document.getElementById('results-message');
            const resultsDetails = document.getElementById('results-details');
            const wrongAnswers = document.getElementById('wrong-answers');
            const labels = ['A', 'B', 'C', 'D'];

            scoreCircle.textContent = correct + '/' + quizData.length;

            if (percentage >= 90) {
                scoreCircle.className = 'score-circle excellent';
                resultsMessage.textContent = 'Xuất sắc!';
            } else if (percentage >= 70) {
                scoreCircle.className = 'score-circle good';
                resultsMessage.textContent = 'Tốt lắm!';
            } else if (percentage >= 50) {
                scoreCircle.className = 'score-circle fair';
                resultsMessage.textContent = 'Cần cố gắng thêm!';
            } else {
                scoreCircle.className = 'score-circle poor';
                resultsMessage.textContent = 'Cần ôn luyện thêm!';
            }

            resultsDetails.innerHTML = `<p>Bạn trả lời đúng <strong>${correct}</strong> trên <strong>${quizData.length}</strong> câu (${percentage}%)</p>`;

            const wrongList = [];
            quizData.forEach((item, index) => {
                const userAnswer = userAnswers[index];
                if (userAnswer !== item.answer) {
                    const selected = userAnswer !== undefined
                        ? `${labels[userAnswer]} - ${item.options[userAnswer]}`
                        : 'Chưa chọn';

                    wrongList.push(`
                        <div class="wrong-item">
                            <div><strong>Câu ${index + 1}:</strong> ${item.question}</div>
                            <div>Bạn chọn: <strong>${selected}</strong></div>
                            <div>Đáp án đúng: <strong>${labels[item.answer]}</strong> - ${item.options[item.answer]}</div>
                        </div>
                    `);
                }
            });

            if (wrongList.length > 0) {
                wrongAnswers.style.display = 'block';
                wrongAnswers.innerHTML = `<h3>Các câu sai (${wrongList.length})</h3>${wrongList.join('')}`;
            } else {
                wrongAnswers.style.display = 'none';
                wrongAnswers.innerHTML = '';
            }

            resultsContainer.classList.add('show');
            document.getElementById('quiz-container').style.display = 'none';
        }

        function resetQuiz() {
            userAnswers = [];

            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('results-container').classList.remove('show');

            document.getElementById('current-question').textContent = '0';
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('incorrect-count').textContent = '0';
            document.getElementById('percentage').textContent = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('wrong-answers').style.display = 'none';
            document.getElementById('wrong-answers').innerHTML = '';

            renderQuiz();
        }

        window.addEventListener('load', renderQuiz);
    </script>
</body>
