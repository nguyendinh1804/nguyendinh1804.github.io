<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương 5 - 45 câu trắc nghiệm thanh toán quốc tế</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .main-menu {
            background: #f5f7ff;
            border-bottom: 1px solid #dfe4ff;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .menu-link {
            text-decoration: none;
            color: #3f51b5;
            background: white;
            border: 1px solid #cdd7ff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .menu-link:hover {
            background: #e8edff;
            border-color: #9fb2ff;
        }

        .menu-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .content {
            padding: 30px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-item {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .question-item.answered {
            border-left-color: #4caf50;
        }

        .question-item.answered.incorrect {
            border-left-color: #f44336;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            padding: 12px 15px;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-container.show {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .score-circle.excellent { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); }
        .score-circle.good { background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%); }
        .score-circle.fair { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); }
        .score-circle.poor { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }

        .results-message {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .results-details {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .wrong-answers {
            text-align: left;
            background: #fff7f7;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 18px;
        }

        .wrong-answers h3 {
            font-size: 18px;
            color: #b71c1c;
            margin-bottom: 12px;
        }

        .wrong-item {
            padding: 10px 0;
            border-bottom: 1px dashed #f0b4b4;
            line-height: 1.5;
            color: #333;
        }

        .wrong-item:last-child {
            border-bottom: none;
        }

        .wrong-item strong {
            color: #c62828;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 21px;
            }

            .content {
                padding: 20px;
            }

            .quiz-info {
                flex-direction: column;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .buttons-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chương 5 - Trắc nghiệm Cấu trúc Dữ liệu</h1>
            <p>Bộ 30 câu hỏi A/B/C/D</p>
        </div>

        <nav class="main-menu">
            <a class="menu-link" href="index.html">Trang này</a>
            <a class="menu-link" href="chuong-1.html">Chương 1</a>
            <a class="menu-link" href="chuong-2.html">Chương 2</a>
            <a class="menu-link" href="chuong-3.html">Chương 3</a>
            <a class="menu-link" href="chuong-4.html">Chương 4</a>
            <a class="menu-link active" href="chuong-5.html">Chương 5</a>
            <a class="menu-link" href="chuong-6.html">Chương 6</a>
        </nav>

        <div class="content">
            <div class="quiz-info">
                <div class="info-item">
                    <span class="info-label">Câu hỏi</span>
                    <span class="info-value"><span id="current-question">0</span>/30</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Câu đúng</span>
                    <span class="info-value" style="color: #4caf50;" id="correct-count">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Câu sai</span>
                    <span class="info-value" style="color: #f44336;" id="incorrect-count">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Tỷ lệ</span>
                    <span class="info-value" id="percentage">0%</span>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div id="quiz-container"></div>

            <div id="results-container" class="results-container">
                <div class="score-circle" id="score-circle">0/30</div>
                <div class="results-message" id="results-message"></div>
                <div class="results-details" id="results-details"></div>
                <div class="wrong-answers" id="wrong-answers" style="display: none;"></div>
            </div>

            <div class="buttons-container">
                <button class="btn btn-secondary" id="btn-reset" onclick="resetQuiz()">Làm lại</button>
                <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()">Nộp bài</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { question: 'Trong cây nhị phân tìm kiếm (BST), phần tử bên trái của một nút có giá trị…', options: ['Lớn hơn nút gốc', 'Nhỏ hơn nút gốc', 'Bằng nút gốc', 'Không xác định'], answer: 1 },
            { question: 'Độ phức tạp trung bình của thao tác tìm kiếm trong BST là…', options: ['O(1)', 'O(log n)', 'O(n)', 'O(n log n)'], answer: 1 },
            { question: 'Trong cây nhị phân, số nút tối đa ở mức k là…', options: ['2^k', 'k', 'k^2', '2^{k-1}'], answer: 0 },
            { question: 'Một cây nhị phân đầy đủ có n nút thì chiều cao của cây xấp xỉ…', options: ['log_2 n', 'n', 'n/2', 'sqrt(n)'], answer: 0 },
            { question: 'Heap thường được dùng để cài đặt…', options: ['Stack', 'Queue', 'Priority Queue', 'Linked List'], answer: 2 },
            { question: 'Trong cây AVL, độ lệch cân bằng của mỗi nút nằm trong khoảng…', options: ['-2 đến 2', '-1 đến 1', '0 đến 2', '-3 đến 3'], answer: 1 },
            { question: 'Phép xoay đơn trái trong cây AVL được dùng khi…', options: ['Mất cân bằng Left-Left', 'Mất cân bằng Right-Right', 'Mất cân bằng Left-Right', 'Mất cân bằng Right-Left'], answer: 0 },
            { question: 'Cây đỏ-đen là một loại…', options: ['Heap', 'Cây nhị phân cân bằng', 'Cây B', 'Cây Huffman'], answer: 1 },
            { question: 'Trong cây đỏ-đen, nút gốc luôn có màu…', options: ['Đỏ', 'Đen', 'Tùy ý', 'Không xác định'], answer: 1 },
            { question: 'Cây Huffman dùng để…', options: ['Nén dữ liệu', 'Tìm kiếm nhanh', 'Cân bằng cây', 'Quản lý bộ nhớ'], answer: 0 },
            { question: 'Độ phức tạp xây dựng cây Huffman với n ký tự là…', options: ['O(n log n)', 'O(n)', 'O(log n)', 'O(n^2)'], answer: 0 },
            { question: 'Trong cây nhị phân, số nút lá tối đa là…', options: ['n/2', 'n', 'n-1', 'log n'], answer: 0 },
            { question: 'Phép duyệt cây theo thứ tự NLR là…', options: ['Tiền tự (Preorder)', 'Trung tự (Inorder)', 'Hậu tự (Postorder)', 'Level-order'], answer: 0 },
            { question: 'Duyệt cây theo Inorder trong BST sẽ cho kết quả…', options: ['Ngẫu nhiên', 'Dãy tăng dần', 'Dãy giảm dần', 'Không xác định'], answer: 1 },
            { question: 'Trong cây nhị phân hoàn chỉnh, số nút ở mức cuối cùng có thể…', options: ['Ít hơn mức đầy đủ', 'Luôn đủ', 'Luôn bằng số nút gốc', 'Không xác định'], answer: 0 },
            { question: 'Khi chèn phần tử vào heap, ta thực hiện…', options: ['Heapify-up', 'Heapify-down', 'Xoay cây', 'Duyệt cây'], answer: 0 },
            { question: 'Khi xóa phần tử gốc trong heap, ta thực hiện…', options: ['Heapify-down', 'Heapify-up', 'Xoay cây', 'Duyệt cây'], answer: 0 },
            { question: 'Cây B (B-tree) thường dùng trong…', options: ['Bộ nhớ ngoài (disk)', 'RAM', 'CPU cache', 'Stack'], answer: 0 },
            { question: 'Trong cây B, mỗi nút có tối đa…', options: ['m con', '2 con', '3 con', 'Không giới hạn'], answer: 0 },
            { question: 'Cây B+ khác cây B ở chỗ…', options: ['Các nút lá liên kết với nhau', 'Có nhiều nút gốc', 'Không cân bằng', 'Không có khóa'], answer: 0 },
            { question: 'Cây nhị phân có chiều cao h thì số nút tối đa là…', options: ['2^{h+1}-1', '2^h', 'h^2', 'h'], answer: 0 },
            { question: 'Trong cây AVL, khi mất cân bằng Left-Right, ta cần…', options: ['Xoay kép', 'Xoay đơn trái', 'Xoay đơn phải', 'Không cần xoay'], answer: 0 },
            { question: 'Cây đỏ-đen đảm bảo chiều cao tối đa là…', options: ['2 log n', 'log n', 'n', '√n'], answer: 0 },
            { question: 'Trong cây Huffman, ký tự có tần suất xuất hiện cao sẽ có…', options: ['Mã dài', 'Mã ngắn', 'Mã ngẫu nhiên', 'Không có mã'], answer: 1 },
            { question: 'Heap có thể được cài đặt bằng…', options: ['Mảng', 'Linked List', 'Stack', 'Queue'], answer: 0 },
            { question: 'Trong cây nhị phân, số cạnh luôn bằng…', options: ['Số nút - 1', 'Số nút', 'Số nút + 1', 'Không xác định'], answer: 0 },
            { question: 'Duyệt cây theo Level-order thường dùng…', options: ['Queue', 'Stack', 'Heap', 'Linked List'], answer: 0 },
            { question: 'Trong BST, khi xóa một nút có 2 con, ta thay bằng…', options: ['Nút lá bất kỳ', 'Nút kế tiếp Inorder', 'Nút gốc', 'Nút bất kỳ'], answer: 1 },
            { question: 'Cây nhị phân đầy đủ có số nút lá bằng…', options: ['2^h', 'h', 'h^2', 'n'], answer: 0 },
            { question: 'Ứng dụng chính của cây tìm kiếm nhị phân là…', options: ['Tìm kiếm nhanh', 'Nén dữ liệu', 'Quản lý bộ nhớ', 'Tính toán số học'], answer: 0 }
        ];

        let userAnswers = [];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((item, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.id = `question-${index}`;

                const numberDiv = document.createElement('div');
                numberDiv.className = 'question-number';
                numberDiv.textContent = `Câu ${index + 1}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'question-text';
                textDiv.textContent = item.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D'];
                item.options.forEach((option, optionIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = labels[optionIndex] + '. ' + option;
                    btn.onclick = () => selectAnswer(index, optionIndex);
                    btn.id = `option-${index}-${optionIndex}`;
                    optionsDiv.appendChild(btn);
                });

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.id = `feedback-${index}`;

                questionDiv.appendChild(numberDiv);
                questionDiv.appendChild(textDiv);
                questionDiv.appendChild(optionsDiv);
                questionDiv.appendChild(feedbackDiv);

                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;

            ['A', 'B', 'C', 'D'].forEach((_, i) => {
                const btn = document.getElementById(`option-${questionIndex}-${i}`);
                if (btn) {
                    if (i === optionIndex) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                }
            });

            document.getElementById(`question-${questionIndex}`).classList.add('answered');
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(ans => ans !== undefined).length;
            const total = quizData.length;
            const percent = Math.round((answered / total) * 100);

            document.getElementById('current-question').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function submitQuiz() {
            let correct = 0;
            let incorrect = 0;

            quizData.forEach((item, index) => {
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                const questionItem = document.getElementById(`question-${index}`);
                const labels = ['A', 'B', 'C', 'D'];
                const isCorrect = userAnswers[index] === item.answer;

                if (isCorrect) {
                    correct++;
                    const btn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (btn) btn.classList.add('correct');
                    feedbackDiv.className = 'feedback show correct';
                    feedbackDiv.textContent = 'Chính xác!';
                } else {
                    incorrect++;
                    const userBtn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (userBtn) userBtn.classList.add('incorrect');
                    const correctBtn = document.getElementById(`option-${index}-${item.answer}`);
                    if (correctBtn) correctBtn.classList.add('correct');
                    feedbackDiv.className = 'feedback show incorrect';
                    feedbackDiv.textContent = `Sai! Đáp án đúng là: ${labels[item.answer]}`;
                    questionItem.classList.add('incorrect');
                }
            });

            const percentage = Math.round((correct / quizData.length) * 100);
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('percentage').textContent = percentage + '%';

            showResults(correct, percentage);
        }

        function showResults(correct, percentage) {
            const resultsContainer = document.getElementById('results-container');
            const scoreCircle = document.getElementById('score-circle');
            const resultsMessage = document.getElementById('results-message');
            const resultsDetails = document.getElementById('results-details');
            const wrongAnswers = document.getElementById('wrong-answers');
            const labels = ['A', 'B', 'C', 'D'];

            scoreCircle.textContent = correct + '/' + quizData.length;

            if (percentage >= 90) {
                scoreCircle.className = 'score-circle excellent';
                resultsMessage.textContent = 'Xuất sắc!';
            } else if (percentage >= 70) {
                scoreCircle.className = 'score-circle good';
                resultsMessage.textContent = 'Tốt lắm!';
            } else if (percentage >= 50) {
                scoreCircle.className = 'score-circle fair';
                resultsMessage.textContent = 'Cần cố gắng thêm!';
            } else {
                scoreCircle.className = 'score-circle poor';
                resultsMessage.textContent = 'Cần ôn luyện thêm!';
            }

            resultsDetails.innerHTML = `<p>Bạn trả lời đúng <strong>${correct}</strong> trên <strong>${quizData.length}</strong> câu (${percentage}%)</p>`;

            const wrongList = [];
            quizData.forEach((item, index) => {
                const userAnswer = userAnswers[index];
                if (userAnswer !== item.answer) {
                    const selected = userAnswer !== undefined
                        ? `${labels[userAnswer]} - ${item.options[userAnswer]}`
                        : 'Chưa chọn';

                    wrongList.push(`
                        <div class="wrong-item">
                            <div><strong>Câu ${index + 1}:</strong> ${item.question}</div>
                            <div>Bạn chọn: <strong>${selected}</strong></div>
                            <div>Đáp án đúng: <strong>${labels[item.answer]}</strong> - ${item.options[item.answer]}</div>
                        </div>
                    `);
                }
            });

            if (wrongList.length > 0) {
                wrongAnswers.style.display = 'block';
                wrongAnswers.innerHTML = `<h3>Các câu sai (${wrongList.length})</h3>${wrongList.join('')}`;
            } else {
                wrongAnswers.style.display = 'none';
                wrongAnswers.innerHTML = '';
            }

            resultsContainer.classList.add('show');
            document.getElementById('quiz-container').style.display = 'none';
        }

        function resetQuiz() {
            userAnswers = [];

            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('results-container').classList.remove('show');

            document.getElementById('current-question').textContent = '0';
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('incorrect-count').textContent = '0';
            document.getElementById('percentage').textContent = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('wrong-answers').style.display = 'none';
            document.getElementById('wrong-answers').innerHTML = '';

            renderQuiz();
        }

        window.addEventListener('load', renderQuiz);
    </script>
</body>
</html>
