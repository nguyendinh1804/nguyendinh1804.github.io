<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương 5 - 45 câu trắc nghiệm thanh toán quốc tế</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .main-menu {
            background: #f5f7ff;
            border-bottom: 1px solid #dfe4ff;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .menu-link {
            text-decoration: none;
            color: #3f51b5;
            background: white;
            border: 1px solid #cdd7ff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .menu-link:hover {
            background: #e8edff;
            border-color: #9fb2ff;
        }

        .menu-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .content {
            padding: 30px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .question-item.answered {
            border-left-color: #4caf50;
        }

        .question-item.answered.incorrect {
            border-left-color: #f44336;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            padding: 12px 15px;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-container.show {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .score-circle.excellent { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); }
        .score-circle.good { background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%); }
        .score-circle.fair { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); }
        .score-circle.poor { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }

        .results-message {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .results-details {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .wrong-answers {
            text-align: left;
            background: #fff7f7;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 18px;
        }

        .wrong-answers h3 {
            font-size: 18px;
            color: #b71c1c;
            margin-bottom: 12px;
        }

        .wrong-item {
            padding: 10px 0;
            border-bottom: 1px dashed #f0b4b4;
            line-height: 1.5;
            color: #333;
        }

        .wrong-item:last-child {
            border-bottom: none;
        }

        .wrong-item strong {
            color: #c62828;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 21px;
            }

            .content {
                padding: 20px;
            }

            .quiz-info {
                flex-direction: column;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .buttons-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chương 5 - Trắc nghiệm Kinh tế</h1>
            <p>Bộ 30 câu hỏi Kinh tế – Chương 5</p>
        </div>

        <nav class="main-menu">
            <a class="menu-link" href="index.html">Trang này</a>
            <a class="menu-link" href="chuong-1.html">Chương 1</a>
            <a class="menu-link" href="chuong-2.html">Chương 2</a>
            <a class="menu-link" href="chuong-3.html">Chương 3</a>
            <a class="menu-link" href="chuong-4.html">Chương 4</a>
            <a class="menu-link active" href="chuong-5.html">Chương 5</a>
            <a class="menu-link" href="chuong-6.html">Chương 6</a>
        </nav>

        <div class="content">
            <div class="quiz-info">
                <div class="info-item">
                    <span class="info-label">Câu hỏi</span>
                    <span class="info-value"><span id="current-question">0</span>/30</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Câu đúng</span>
                    <span class="info-value" style="color: #4caf50;" id="correct-count">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Câu sai</span>
                    <span class="info-value" style="color: #f44336;" id="incorrect-count">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Tỷ lệ</span>
                    <span class="info-value" id="percentage">0%</span>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div id="quiz-container"></div>

            <div id="results-container" class="results-container">
                <div class="score-circle" id="score-circle">0/30</div>
                <div class="results-message" id="results-message"></div>
                <div class="results-details" id="results-details"></div>
                <div class="wrong-answers" id="wrong-answers" style="display: none;"></div>
            </div>

            <div class="buttons-container">
                <button class="btn btn-secondary" id="btn-reset" onclick="resetQuiz()">Làm lại</button>
                <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()">Nộp bài</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { question: 'Khi giá hàng hóa tăng, lượng cầu thường…', options: ['Tăng', 'Giảm', 'Không đổi', 'Tăng gấp đôi'], answer: 1 },
            { question: 'Độ co giãn của cầu theo giá đo lường…', options: ['Mức thay đổi chi phí', 'Mức thay đổi lượng cầu khi giá thay đổi', 'Mức thay đổi cung', 'Mức thay đổi lợi nhuận'], answer: 1 },
            { question: 'Nếu cầu co giãn > 1, khi giá giảm thì doanh thu…', options: ['Giảm', 'Tăng', 'Không đổi', 'Bằng chi phí'], answer: 1 },
            { question: 'Trong thị trường cạnh tranh hoàn hảo, doanh nghiệp là…', options: ['Người định giá', 'Người chấp nhận giá', 'Người độc quyền', 'Người kiểm soát cung'], answer: 1 },
            { question: 'Đường cung dịch chuyển khi…', options: ['Giá thay đổi', 'Công nghệ thay đổi', 'Cầu thay đổi', 'Doanh thu thay đổi'], answer: 1 },
            { question: 'Chi phí biên (MC) là…', options: ['Tổng chi phí chia sản lượng', 'Chi phí tăng thêm khi sản xuất thêm 1 đơn vị', 'Chi phí cố định', 'Chi phí trung bình'], answer: 1 },
            { question: 'Doanh thu biên (MR) trong cạnh tranh hoàn hảo bằng…', options: ['Giá thị trường', 'Chi phí trung bình', 'Lợi nhuận', 'Chi phí biên'], answer: 0 },
            { question: 'Lợi nhuận tối đa khi…', options: ['MR = MC', 'MR > MC', 'MR < MC', 'MR = ATC'], answer: 0 },
            { question: 'Trong thị trường độc quyền, đường cầu của doanh nghiệp là…', options: ['Ngang', 'Dốc xuống', 'Dốc lên', 'Không xác định'], answer: 1 },
            { question: 'Độ co giãn của cung theo giá đo lường…', options: ['Mức thay đổi chi phí', 'Mức thay đổi lượng cung khi giá thay đổi', 'Mức thay đổi cầu', 'Mức thay đổi lợi nhuận'], answer: 1 },
            { question: 'Khi cầu co giãn < 1, tăng giá sẽ làm doanh thu…', options: ['Tăng', 'Giảm', 'Không đổi', 'Bằng chi phí'], answer: 0 },
            { question: 'Chi phí cố định (FC) là…', options: ['Không đổi theo sản lượng', 'Tăng theo sản lượng', 'Giảm theo sản lượng', 'Bằng chi phí biến đổi'], answer: 0 },
            { question: 'Chi phí trung bình (AC) bằng…', options: ['TC/Q', 'MC/Q', 'FC/Q', 'MR/Q'], answer: 0 },
            { question: 'Trong cạnh tranh hoàn hảo, lợi nhuận dài hạn của doanh nghiệp…', options: ['Dương', 'Âm', 'Bằng 0', 'Không xác định'], answer: 2 },
            { question: 'Đường cầu thị trường là…', options: ['Tổng cầu cá nhân', 'Tổng cung cá nhân', 'Tổng chi phí cá nhân', 'Tổng doanh thu cá nhân'], answer: 0 },
            { question: 'Khi giá trần thấp hơn giá cân bằng, thị trường sẽ…', options: ['Dư thừa', 'Thiếu hụt', 'Cân bằng', 'Không đổi'], answer: 1 },
            { question: 'Khi giá sàn cao hơn giá cân bằng, thị trường sẽ…', options: ['Dư thừa', 'Thiếu hụt', 'Cân bằng', 'Không đổi'], answer: 0 },
            { question: 'Trong độc quyền nhóm (Oligopoly), các doanh nghiệp thường…', options: ['Cạnh tranh hoàn hảo', 'Liên kết hoặc cạnh tranh chiến lược', 'Không sản xuất', 'Độc quyền tuyệt đối'], answer: 1 },
            { question: 'Đường cung dài hạn trong cạnh tranh hoàn hảo có dạng…', options: ['Ngang', 'Dốc lên', 'Dốc xuống', 'Không xác định'], answer: 0 },
            { question: 'Khi cầu co giãn vô hạn, đường cầu có dạng…', options: ['Ngang', 'Dốc lên', 'Dốc xuống', 'Thẳng đứng'], answer: 0 },
            { question: 'Khi cầu co giãn bằng 0, đường cầu có dạng…', options: ['Thẳng đứng', 'Ngang', 'Dốc lên', 'Dốc xuống'], answer: 0 },
            { question: 'Thặng dư tiêu dùng là…', options: ['Lợi ích người tiêu dùng nhận được khi giá thấp hơn mức sẵn sàng trả', 'Lợi nhuận doanh nghiệp', 'Chi phí sản xuất', 'Doanh thu biên'], answer: 0 },
            { question: 'Thặng dư sản xuất là…', options: ['Lợi ích người sản xuất nhận được khi giá cao hơn chi phí sản xuất', 'Lợi nhuận doanh nghiệp', 'Chi phí trung bình', 'Doanh thu biên'], answer: 0 },
            { question: 'Trong độc quyền, giá bán thường…', options: ['Cao hơn cạnh tranh hoàn hảo', 'Thấp hơn cạnh tranh hoàn hảo', 'Bằng cạnh tranh hoàn hảo', 'Không xác định'], answer: 0 },
            { question: 'Trong cạnh tranh hoàn hảo, đường cầu của doanh nghiệp là…', options: ['Ngang', 'Dốc lên', 'Dốc xuống', 'Thẳng đứng'], answer: 0 },
            { question: 'Khi chính phủ đánh thuế hàng hóa, đường cung sẽ…', options: ['Dịch lên trên', 'Dịch xuống dưới', 'Không đổi', 'Dịch sang phải'], answer: 0 },
            { question: 'Tổn thất vô ích (Deadweight loss) xảy ra khi…', options: ['Thị trường không đạt cân bằng tối ưu', 'Thị trường cạnh tranh hoàn hảo', 'Lợi nhuận bằng 0', 'Chi phí bằng doanh thu'], answer: 0 },
            { question: 'Trong mô hình Cournot, các doanh nghiệp quyết định…', options: ['Giá', 'Sản lượng', 'Chi phí', 'Lợi nhuận'], answer: 1 },
            { question: 'Trong mô hình Bertrand, các doanh nghiệp quyết định…', options: ['Giá', 'Sản lượng', 'Chi phí', 'Lợi nhuận'], answer: 0 },
            { question: 'Mục tiêu chính của doanh nghiệp trong kinh tế học vi mô là…', options: ['Tối đa hóa lợi nhuận', 'Tối đa hóa chi phí', 'Tối đa hóa sản lượng', 'Tối đa hóa doanh thu'], answer: 0 }
        ];

        let userAnswers = [];
        let questionShuffles = []; // stores shuffled option order per question
        let answerPositionCounts = [0, 0, 0, 0];

        function shuffleArray(items) {
            const array = items.slice();
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getBalancedAnswerPosition() {
            const minCount = Math.min(...answerPositionCounts);
            const candidates = answerPositionCounts
                .map((count, index) => ({ count, index }))
                .filter(item => item.count === minCount)
                .map(item => item.index);

            return candidates[Math.floor(Math.random() * candidates.length)];
        }

        function buildBalancedShuffle(item) {
            const correctOption = {
                text: item.options[item.answer],
                originalIndex: item.answer
            };

            const distractors = item.options
                .map((opt, index) => ({ text: opt, originalIndex: index }))
                .filter(opt => opt.originalIndex !== item.answer);

            const shuffledDistractors = shuffleArray(distractors);
            const answerPosition = getBalancedAnswerPosition();
            const result = [];
            let distractorIndex = 0;

            for (let i = 0; i < item.options.length; i++) {
                if (i === answerPosition) {
                    result.push(correctOption);
                } else {
                    result.push(shuffledDistractors[distractorIndex]);
                    distractorIndex++;
                }
            }

            answerPositionCounts[answerPosition]++;
            return result;
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            questionShuffles = [];
            answerPositionCounts = [0, 0, 0, 0];

            quizData.forEach((item, index) => {
                const opts = buildBalancedShuffle(item);
                questionShuffles.push(opts);

                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.id = `question-${index}`;

                const numberDiv = document.createElement('div');
                numberDiv.className = 'question-number';
                numberDiv.textContent = `Câu ${index + 1}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'question-text';
                textDiv.textContent = item.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D'];
                opts.forEach((optObj, optionIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = labels[optionIndex] + '. ' + optObj.text;
                    btn.onclick = () => selectAnswer(index, optionIndex);
                    btn.id = `option-${index}-${optionIndex}`;
                    btn.dataset.original = optObj.originalIndex;
                    optionsDiv.appendChild(btn);
                });

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.id = `feedback-${index}`;

                questionDiv.appendChild(numberDiv);
                questionDiv.appendChild(textDiv);
                questionDiv.appendChild(optionsDiv);
                questionDiv.appendChild(feedbackDiv);

                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(questionIndex, optionIndex) {
            const orig = questionShuffles[questionIndex][optionIndex].originalIndex;
            userAnswers[questionIndex] = orig;

            const displayedCount = questionShuffles[questionIndex].length;
            for (let i = 0; i < displayedCount; i++) {
                const btn = document.getElementById(`option-${questionIndex}-${i}`);
                if (btn) {
                    if (i === optionIndex) btn.classList.add('selected');
                    else btn.classList.remove('selected');
                }
            }

            document.getElementById(`question-${questionIndex}`).classList.add('answered');
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(ans => ans !== undefined).length;
            const total = quizData.length;
            const percent = Math.round((answered / total) * 100);

            document.getElementById('current-question').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function submitQuiz() {
            let correct = 0;
            let incorrect = 0;

            quizData.forEach((item, index) => {
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                const questionItem = document.getElementById(`question-${index}`);
                const labels = ['A', 'B', 'C', 'D'];

                const userOrig = userAnswers[index];
                const isCorrect = userOrig === item.answer;

                const userDisplay = userOrig !== undefined
                    ? questionShuffles[index].findIndex(o => o.originalIndex === userOrig)
                    : -1;
                const correctDisplay = questionShuffles[index].findIndex(o => o.originalIndex === item.answer);

                if (isCorrect) {
                    correct++;
                    if (userDisplay >= 0) {
                        const btn = document.getElementById(`option-${index}-${userDisplay}`);
                        if (btn) btn.classList.add('correct');
                    }
                    feedbackDiv.className = 'feedback show correct';
                    feedbackDiv.textContent = 'Chính xác!';
                } else {
                    incorrect++;
                    if (userDisplay >= 0) {
                        const userBtn = document.getElementById(`option-${index}-${userDisplay}`);
                        if (userBtn) userBtn.classList.add('incorrect');
                    }
                    if (correctDisplay >= 0) {
                        const correctBtn = document.getElementById(`option-${index}-${correctDisplay}`);
                        if (correctBtn) correctBtn.classList.add('correct');
                    }
                    feedbackDiv.className = 'feedback show incorrect';
                    const correctLabel = correctDisplay >= 0 ? labels[correctDisplay] : '?';
                    feedbackDiv.textContent = `Sai! Đáp án đúng là: ${correctLabel}`;
                    questionItem.classList.add('incorrect');
                }
            });

            const percentage = Math.round((correct / quizData.length) * 100);
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('percentage').textContent = percentage + '%';

            showResults(correct, percentage);
        }

        function showResults(correct, percentage) {
            const resultsContainer = document.getElementById('results-container');
            const scoreCircle = document.getElementById('score-circle');
            const resultsMessage = document.getElementById('results-message');
            const resultsDetails = document.getElementById('results-details');
            const wrongAnswers = document.getElementById('wrong-answers');
            const labels = ['A', 'B', 'C', 'D'];

            scoreCircle.textContent = correct + '/' + quizData.length;

            if (percentage >= 90) {
                scoreCircle.className = 'score-circle excellent';
                resultsMessage.textContent = 'Xuất sắc!';
            } else if (percentage >= 70) {
                scoreCircle.className = 'score-circle good';
                resultsMessage.textContent = 'Tốt lắm!';
            } else if (percentage >= 50) {
                scoreCircle.className = 'score-circle fair';
                resultsMessage.textContent = 'Cần cố gắng thêm!';
            } else {
                scoreCircle.className = 'score-circle poor';
                resultsMessage.textContent = 'Cần ôn luyện thêm!';
            }

            resultsDetails.innerHTML = `<p>Bạn trả lời đúng <strong>${correct}</strong> trên <strong>${quizData.length}</strong> câu (${percentage}%)</p>`;

            const wrongList = [];
            quizData.forEach((item, index) => {
                const userAnswer = userAnswers[index];
                const userDisplay = userAnswer !== undefined
                    ? questionShuffles[index].findIndex(o => o.originalIndex === userAnswer)
                    : -1;
                const correctDisplay = questionShuffles[index].findIndex(o => o.originalIndex === item.answer);

                if (userAnswer !== item.answer) {
                    const selected = userDisplay >= 0
                        ? `${labels[userDisplay]} - ${questionShuffles[index][userDisplay].text}`
                        : 'Chưa chọn';
                    const correctLabel = correctDisplay >= 0 ? labels[correctDisplay] : '?';

                    wrongList.push(`
                        <div class="wrong-item">
                            <div><strong>Câu ${index + 1}:</strong> ${item.question}</div>
                            <div>Bạn chọn: <strong>${selected}</strong></div>
                            <div>Đáp án đúng: <strong>${correctLabel}</strong> - ${questionShuffles[index][correctDisplay].text}</div>
                        </div>
                    `);
                }
            });

            if (wrongList.length > 0) {
                wrongAnswers.style.display = 'block';
                wrongAnswers.innerHTML = `<h3>Các câu sai (${wrongList.length})</h3>${wrongList.join('')}`;
            } else {
                wrongAnswers.style.display = 'none';
                wrongAnswers.innerHTML = '';
            }

            resultsContainer.classList.add('show');
            document.getElementById('quiz-container').style.display = 'none';
        }

        function resetQuiz() {
            userAnswers = [];

            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('results-container').classList.remove('show');

            document.getElementById('current-question').textContent = '0';
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('incorrect-count').textContent = '0';
            document.getElementById('percentage').textContent = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('wrong-answers').style.display = 'none';
            document.getElementById('wrong-answers').innerHTML = '';

            renderQuiz();
        }

        window.addEventListener('load', renderQuiz);
    </script>
</body>
</html>
