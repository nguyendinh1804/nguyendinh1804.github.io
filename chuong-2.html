<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương 2 - 30 câu trắc nghiệm chuyển đổi số</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .main-menu {
            background: #f5f7ff;
            border-bottom: 1px solid #dfe4ff;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .menu-link {
            text-decoration: none;
            color: #3f51b5;
            background: white;
            border: 1px solid #cdd7ff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .menu-link:hover {
            background: #e8edff;
            border-color: #9fb2ff;
        }

        .menu-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .content {
            padding: 30px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-item {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .question-item.answered {
            border-left-color: #4caf50;
        }

        .question-item.answered.incorrect {
            border-left-color: #f44336;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            padding: 12px 15px;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-container.show {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .score-circle.excellent { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); }
        .score-circle.good { background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%); }
        .score-circle.fair { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); }
        .score-circle.poor { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }

        .results-message {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .results-details {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .wrong-answers {
            text-align: left;
            background: #fff7f7;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 18px;
        }

        .wrong-answers h3 {
            font-size: 18px;
            color: #b71c1c;
            margin-bottom: 12px;
        }

        .wrong-item {
            padding: 10px 0;
            border-bottom: 1px dashed #f0b4b4;
            line-height: 1.5;
            color: #333;
        }

        .wrong-item:last-child {
            border-bottom: none;
        }

        .wrong-item strong {
            color: #c62828;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 21px;
            }

            .content {
                padding: 20px;
            }

            .quiz-info {
                flex-direction: column;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .buttons-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chương 2 - Trắc nghiệm chuyển đổi số</h1>
            <p>Bộ 30 câu hỏi A/B/C/D</p>
        </div>

        <nav class="main-menu">
            <a class="menu-link" href="index.html">Trang này</a>
            <a class="menu-link" href="chuong-1.html">Chương 1</a>
            <a class="menu-link active" href="chuong-2.html">Chương 2</a>
            <a class="menu-link" href="chuong-3.html">Chương 3</a>
            <a class="menu-link" href="chuong-4.html">Chương 4</a>
            <a class="menu-link" href="chuong-5.html">Chương 5</a>
            <a class="menu-link" href="chuong-6.html">Chương 6</a>
        </nav>

        <div class="content">
            <div class="quiz-info">
                <div class="info-item">
                    <span class="info-label">Câu hỏi</span>
                    <span class="info-value"><span id="current-question">0</span>/30</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Câu đúng</span>
                    <span class="info-value" style="color: #4caf50;" id="correct-count">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Câu sai</span>
                    <span class="info-value" style="color: #f44336;" id="incorrect-count">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Tỷ lệ</span>
                    <span class="info-value" id="percentage">0%</span>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div id="quiz-container"></div>

            <div id="results-container" class="results-container">
                <div class="score-circle" id="score-circle">0/30</div>
                <div class="results-message" id="results-message"></div>
                <div class="results-details" id="results-details"></div>
                <div class="wrong-answers" id="wrong-answers" style="display: none;"></div>
            </div>

            <div class="buttons-container">
                <button class="btn btn-secondary" id="btn-reset" onclick="resetQuiz()">Làm lại</button>
                <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()">Nộp bài</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { question: "‘Dữ liệu số’ theo Nghị định 47/2020/NĐ-CP là gì?", options: ["Văn bản giấy tờ", "Thông tin dạng ký hiệu, chữ viết, chữ số, hình ảnh, âm thanh biểu diễn bằng tín hiệu số", "Tài sản hữu hình", "Vật liệu kỹ thuật số"], answer: 1 },
            { question: "Thông tin khác dữ liệu ở điểm nào?", options: ["Là kết quả xử lý dữ liệu, có tổ chức và mang ý nghĩa", "Là dữ liệu thô chưa qua xử lý", "Chỉ bao gồm ảnh và âm thanh", "Là mã số nhị phân"], answer: 0 },
            { question: "Tri thức (Knowledge) được hiểu là:", options: ["Dữ liệu thô", "Sự tổng hợp, tích lũy thông tin qua kinh nghiệm, phân tích và nhận thức sâu sắc", "Văn bản giấy tờ", "Mã số nhị phân"], answer: 1 },
            { question: "Môi trường số là gì?", options: ["Không gian vật lý", "Không gian ảo nơi dữ liệu, thông tin được tạo ra, lưu trữ và trao đổi qua công nghệ số", "Hệ thống máy chủ vật lý", "Văn phòng truyền thống"], answer: 1 },
            { question: "Siêu dữ liệu (Metadata) là:", options: ["Dữ liệu mô tả chi tiết về dữ liệu", "Dữ liệu thô", "Văn bản giấy tờ", "Thông tin khách hàng"], answer: 0 },
            { question: "Khách hàng trong hệ sinh thái CĐS được coi là:", options: ["Tài sản hữu hình", "Động lực trung tâm của mọi nỗ lực chuyển đổi số", "Một yếu tố phụ trợ", "Nguồn vốn không quan trọng"], answer: 1 },
            { question: "Nguồn thông tin khách hàng gồm:", options: ["Chỉ mạng xã hội", "Chỉ khảo sát trực tiếp", "Nội bộ và bên ngoài", "Chỉ dữ liệu mua ngoài"], answer: 2 },
            { question: "Giá trị khách hàng trong chuyển đổi số là gì?", options: ["Chỉ giá cả sản phẩm/dịch vụ", "Cách thức doanh nghiệp cung ứng SP/DV nhằm thỏa mãn nhu cầu và mang đến trải nghiệm", "Văn bản giấy tờ", "Mã số nhị phân"], answer: 1 },
            { question: "Nhân lực số là:", options: ["Lao động phổ thông", "Lực lượng lao động kỹ thuật chuyên nghiệp tham gia trực tiếp vào sản xuất SP/DV công nghệ thông tin", "Khách hàng trung thành", "Nhà quản lý tài chính"], answer: 1 },
            { question: "Công nghệ số là:", options: ["Máy móc truyền thống", "Các công nghệ dựa trên tín hiệu số phục vụ hoạt động trong môi trường số", "Văn bản giấy tờ", "Tài sản hữu hình"], answer: 1 },
            { question: "Hạ tầng số bao gồm thành phần nào sau đây?", options: ["Trung tâm dữ liệu, cáp quang, phần cứng máy chủ, phần mềm cơ sở hạ tầng", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Nền tảng số được phân loại thành:", options: ["Tài chính – Thuế – Hải quan", "Marketing – PR – Bán hàng", "Nội bộ – Kinh doanh – Quốc gia", "Sản xuất – Kho – Vận tải"], answer: 2 },
            { question: "Niềm tin số là gì?", options: ["Niềm tin vào hệ thống và giao dịch số của người dân và doanh nghiệp", "Niềm tin vào văn bản giấy tờ", "Niềm tin vào tài sản hữu hình", "Niềm tin vào mã số nhị phân"], answer: 0 },
            { question: "Vai trò của dữ liệu trong CĐS là:", options: ["Không quan trọng", "Là nền tảng để tạo ra thông tin và tri thức, hỗ trợ ra quyết định", "Chỉ là dữ liệu thô", "Chỉ dùng cho lưu trữ"], answer: 1 },
            { question: "Trải nghiệm khách hàng (CX) trong CĐS được coi là:", options: ["Yếu tố phụ trợ", "Động lực trung tâm của mọi nỗ lực CĐS", "Văn bản giấy tờ", "Mã số nhị phân"], answer: 1 },
            { question: "Năng lực lãnh đạo số bao gồm:", options: ["Xây dựng chiến lược, thay đổi mô hình kinh doanh, đầu tư hạ tầng mới, phát triển chương trình đào tạo", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Công nghệ số giúp doanh nghiệp:", options: ["Giảm giá trị khách hàng", "Gia tăng giá trị và trải nghiệm khách hàng", "Loại bỏ khách hàng", "Chỉ lưu trữ dữ liệu"], answer: 1 },
            { question: "Chính sách phát triển CĐS nhằm:", options: ["Kiến tạo môi trường thúc đẩy sự tương tác giữa các đối tượng trong quá trình CĐS", "Văn bản giấy tờ", "Tài sản hữu hình", "Mã số nhị phân"], answer: 0 },
            { question: "Ví dụ về giá trị khách hàng trong TMĐT là:", options: ["Cá nhân hóa sản phẩm/dịch vụ, tiết kiệm chi phí tìm kiếm, thuận tiện giao dịch", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Nhân lực số trong CĐS đòi hỏi:", options: ["Trình độ và kỹ năng vận dụng, xử lý nhanh, chính xác cao", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Phân biệt hạ tầng số và nền tảng số qua ví dụ:", options: ["Hạ tầng số: cáp quang; Nền tảng số: hệ thống e-banking", "Hạ tầng số: văn bản giấy tờ; Nền tảng số: khách hàng trung thành", "Hạ tầng số: tài sản hữu hình; Nền tảng số: mã số nhị phân", "Hạ tầng số: văn phòng truyền thống; Nền tảng số: giấy tờ"], answer: 0 },
            { question: "Nguồn thông tin khách hàng có thể đến từ:", options: ["Nội bộ doanh nghiệp, khảo sát trực tiếp, dữ liệu phân tích từ Google, Facebook", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Rủi ro của doanh nghiệp khi không hiểu đúng nhu cầu khách hàng trong CĐS là:", options: ["Bỏ lỡ cơ hội kinh doanh và mang đến những gì khách hàng không cần", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Ví dụ về ứng dụng công nghệ số trong nông nghiệp là:", options: ["Máy móc và drones", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Tiêu chuẩn của lãnh đạo số gồm:", options: ["Sáng tạo, kiến thức, năng lực, thích nghi thay đổi, tầm nhìn toàn cầu", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Chính sách pháp luật trong CĐS có vai trò:", options: ["Tạo hành lang pháp lý, đảm bảo an ninh mạng, xây dựng niềm tin số", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Ví dụ về nền tảng kinh doanh (Business Platform):", options: ["Website thương mại điện tử", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Ví dụ về nền tảng quản trị nội bộ:", options: ["Hệ thống ERP quản lý nguồn lực doanh nghiệp", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Ví dụ về nền tảng quốc gia:", options: ["Nền tảng danh tính số", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 },
            { question: "Tạo lập niềm tin số là yếu tố sống còn vì:", options: ["Khuyến khích người dân sử dụng dịch vụ số và duy trì sự phát triển của CĐS", "Văn bản giấy tờ", "Khách hàng trung thành", "Tài sản hữu hình"], answer: 0 }
        ];

        let userAnswers = [];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((item, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.id = `question-${index}`;

                const numberDiv = document.createElement('div');
                numberDiv.className = 'question-number';
                numberDiv.textContent = `Câu ${index + 1}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'question-text';
                textDiv.textContent = item.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D'];
                item.options.forEach((option, optionIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = labels[optionIndex] + '. ' + option;
                    btn.onclick = () => selectAnswer(index, optionIndex);
                    btn.id = `option-${index}-${optionIndex}`;
                    optionsDiv.appendChild(btn);
                });

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.id = `feedback-${index}`;

                questionDiv.appendChild(numberDiv);
                questionDiv.appendChild(textDiv);
                questionDiv.appendChild(optionsDiv);
                questionDiv.appendChild(feedbackDiv);

                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;

            ['A', 'B', 'C', 'D'].forEach((_, i) => {
                const btn = document.getElementById(`option-${questionIndex}-${i}`);
                if (btn) {
                    if (i === optionIndex) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                }
            });

            document.getElementById(`question-${questionIndex}`).classList.add('answered');

            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(ans => ans !== undefined).length;
            const total = quizData.length;
            const percent = Math.round((answered / total) * 100);

            document.getElementById('current-question').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function submitQuiz() {
            let correct = 0;
            let incorrect = 0;

            quizData.forEach((item, index) => {
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                const questionItem = document.getElementById(`question-${index}`);
                const labels = ['A', 'B', 'C', 'D'];
                const isCorrect = userAnswers[index] === item.answer;

                if (isCorrect) {
                    correct++;
                    const btn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (btn) btn.classList.add('correct');
                    feedbackDiv.className = 'feedback show correct';
                    feedbackDiv.textContent = 'Chính xác!';
                } else {
                    incorrect++;
                    const userBtn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (userBtn) userBtn.classList.add('incorrect');
                    const correctBtn = document.getElementById(`option-${index}-${item.answer}`);
                    if (correctBtn) correctBtn.classList.add('correct');
                    feedbackDiv.className = 'feedback show incorrect';
                    feedbackDiv.textContent = `Sai! Đáp án đúng là: ${labels[item.answer]}`;
                    questionItem.classList.add('incorrect');
                }
            });

            const percentage = Math.round((correct / quizData.length) * 100);
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('percentage').textContent = percentage + '%';

            showResults(correct, percentage);
        }

        function showResults(correct, percentage) {
            const resultsContainer = document.getElementById('results-container');
            const scoreCircle = document.getElementById('score-circle');
            const resultsMessage = document.getElementById('results-message');
            const resultsDetails = document.getElementById('results-details');
            const wrongAnswers = document.getElementById('wrong-answers');
            const labels = ['A', 'B', 'C', 'D'];

            scoreCircle.textContent = correct + '/' + quizData.length;

            if (percentage >= 90) {
                scoreCircle.className = 'score-circle excellent';
                resultsMessage.textContent = 'Xuất sắc!';
            } else if (percentage >= 70) {
                scoreCircle.className = 'score-circle good';
                resultsMessage.textContent = 'Tốt lắm!';
            } else if (percentage >= 50) {
                scoreCircle.className = 'score-circle fair';
                resultsMessage.textContent = 'Cần cố gắng thêm!';
            } else {
                scoreCircle.className = 'score-circle poor';
                resultsMessage.textContent = 'Cần ôn luyện thêm!';
            }

            resultsDetails.innerHTML = `<p>Bạn trả lời đúng <strong>${correct}</strong> trên <strong>${quizData.length}</strong> câu (${percentage}%)</p>`;

            const wrongList = [];
            quizData.forEach((item, index) => {
                const userAnswer = userAnswers[index];
                if (userAnswer !== item.answer) {
                    const selected = userAnswer !== undefined
                        ? `${labels[userAnswer]} - ${item.options[userAnswer]}`
                        : 'Chưa chọn';

                    wrongList.push(`
                        <div class="wrong-item">
                            <div><strong>Câu ${index + 1}:</strong> ${item.question}</div>
                            <div>Bạn chọn: <strong>${selected}</strong></div>
                            <div>Đáp án đúng: <strong>${labels[item.answer]}</strong> - ${item.options[item.answer]}</div>
                        </div>
                    `);
                }
            });

            if (wrongList.length > 0) {
                wrongAnswers.style.display = 'block';
                wrongAnswers.innerHTML = `<h3>Các câu sai (${wrongList.length})</h3>${wrongList.join('')}`;
            } else {
                wrongAnswers.style.display = 'none';
                wrongAnswers.innerHTML = '';
            }

            resultsContainer.classList.add('show');
            document.getElementById('quiz-container').style.display = 'none';
        }

        function resetQuiz() {
            userAnswers = [];

            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('results-container').classList.remove('show');

            document.getElementById('current-question').textContent = '0';
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('incorrect-count').textContent = '0';
            document.getElementById('percentage').textContent = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('wrong-answers').style.display = 'none';
            document.getElementById('wrong-answers').innerHTML = '';

            renderQuiz();
        }

        window.addEventListener('load', renderQuiz);
    </script>
</body>
</html>
