<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương 4 - 30 câu trắc nghiệm thanh toán quốc tế</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .main-menu {
            background: #f5f7ff;
            border-bottom: 1px solid #dfe4ff;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .menu-link {
            text-decoration: none;
            color: #3f51b5;
            background: white;
            border: 1px solid #cdd7ff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .menu-link:hover {
            background: #e8edff;
            border-color: #9fb2ff;
        }

        .menu-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .content {
            padding: 30px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-item {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .question-item.answered {
            border-left-color: #4caf50;
        }

        .question-item.answered.incorrect {
            border-left-color: #f44336;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            padding: 12px 15px;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-container.show {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .score-circle.excellent { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); }
        .score-circle.good { background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%); }
        .score-circle.fair { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); }
        .score-circle.poor { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }

        .results-message {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .results-details {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .wrong-answers {
            text-align: left;
            background: #fff7f7;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 18px;
        }

        .wrong-answers h3 {
            font-size: 18px;
            color: #b71c1c;
            margin-bottom: 12px;
        }

        .wrong-item {
            padding: 10px 0;
            border-bottom: 1px dashed #f0b4b4;
            line-height: 1.5;
            color: #333;
        }

        .wrong-item:last-child {
            border-bottom: none;
        }

        .wrong-item strong {
            color: #c62828;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 21px;
            }

            .content {
                padding: 20px;
            }

            .quiz-info {
                flex-direction: column;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .buttons-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chương 4 - Trắc nghiệm thanh toán quốc tế</h1>

        <nav class="main-menu">

        <div class="content">
            <div class="quiz-info">

            </div>

            <div class="buttons-container">
                <button class="btn btn-secondary" id="btn-reset" onclick="resetQuiz()">Làm lại</button>
                <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()">Nộp bài</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { question: 'Phương thức chuyển tiền (Remittance) trong thanh toán quốc tế được hiểu là:', options: ['Ngân hàng cam kết thanh toán thay người mua', 'Người chuyển tiền yêu cầu ngân hàng chuyển một số tiền cho người thụ hưởng', 'Hàng được giao trước, tiền tự động thu sau', 'Chỉ dùng cho giao dịch nội địa'], answer: 1 },
            { question: 'Trong phương thức chuyển tiền trả trước 100%, bên chịu rủi ro cao hơn thường là:', options: ['Nhà xuất khẩu', 'Nhà nhập khẩu', 'Ngân hàng chuyển tiền', 'Hải quan'], answer: 1 },
            { question: 'Trong phương thức chuyển tiền trả sau, bên chịu rủi ro cao hơn thường là:', options: ['Nhà xuất khẩu', 'Nhà nhập khẩu', 'Ngân hàng trung ương', 'Công ty bảo hiểm'], answer: 0 },
            { question: 'T/T (Telegraphic Transfer) có đặc điểm chính là:', options: ['Chuyển tiền bằng thư tay giấy', 'Chuyển tiền điện tử, tốc độ nhanh', 'Chỉ dùng cho số tiền nhỏ', 'Không qua ngân hàng'], answer: 1 },
            { question: 'M/T (Mail Transfer) truyền thống khác T/T chủ yếu ở điểm:', options: ['Luôn rẻ hơn và nhanh hơn T/T', 'Dùng phương thức chứng từ điện tử tức thời', 'Gửi lệnh qua thư, thời gian chậm hơn', 'Không cần thông tin người thụ hưởng'], answer: 2 },
            { question: 'Chủ thể phát lệnh chuyển tiền trong giao dịch nhập khẩu thường là:', options: ['Người xuất khẩu', 'Người nhập khẩu', 'Ngân hàng thông báo', 'Hãng tàu'], answer: 1 },
            { question: 'Ngân hàng trong phương thức chuyển tiền thường đóng vai trò chính là:', options: ['Bảo lãnh chắc chắn người bán nhận tiền', 'Trung gian thực hiện lệnh chuyển tiền theo chỉ thị khách hàng', 'Kiểm tra chất lượng hàng hóa', 'Quyết định giá hợp đồng'], answer: 1 },
            { question: 'Một nội dung quan trọng bắt buộc trên lệnh chuyển tiền là:', options: ['Màu bao bì hàng hóa', 'Thông tin tài khoản người thụ hưởng', 'Số container rỗng', 'Tên thuyền trưởng'], answer: 1 },
            { question: 'Mã SWIFT/BIC trong thanh toán quốc tế dùng để:', options: ['Xác định cảng xếp hàng', 'Định danh ngân hàng nhận/chuyển tiền', 'Tính thuế nhập khẩu', 'Kiểm tra chất lượng hàng hóa'], answer: 1 },
            { question: 'Chọn phát biểu đúng về phí ngân hàng trong chuyển tiền:', options: ['Luôn do nhà xuất khẩu chịu toàn bộ', 'Luôn do nhà nhập khẩu chịu toàn bộ', 'Phụ thuộc thỏa thuận phí (OUR/SHA/BEN) giữa các bên', 'Không phát sinh phí'], answer: 2 },
            { question: 'Điều khoản phí OUR nghĩa là:', options: ['Người thụ hưởng chịu mọi phí', 'Người chuyển tiền chịu toàn bộ phí liên quan', 'Hai bên chia đôi bắt buộc', 'Ngân hàng phát hành chịu phí'], answer: 1 },
            { question: 'Điều khoản phí BEN nghĩa là:', options: ['Người chuyển tiền chịu tất cả phí', 'Người thụ hưởng chịu phí ngân hàng', 'Bên mua và bên bán không chịu phí', 'Chỉ áp dụng cho L/C'], answer: 1 },
            { question: 'Điều khoản phí SHA thường được hiểu là:', options: ['Người chuyển tiền chịu phí ngân hàng của mình, người thụ hưởng chịu phí ngân hàng bên nhận/trung gian', 'Người chuyển tiền chịu toàn bộ phí', 'Người thụ hưởng chịu toàn bộ phí', 'Không có phí trung gian'], answer: 0 },
            { question: 'Trong chuyển tiền trả trước, biện pháp giảm rủi ro cho nhà nhập khẩu là:', options: ['Không cần hợp đồng', 'Đặt cọc một phần, thanh toán phần còn lại theo mốc giao hàng/chứng từ', 'Trả toàn bộ không điều kiện ngay từ đầu', 'Không kiểm tra đối tác'], answer: 1 },
            { question: 'Trong chuyển tiền trả sau, biện pháp giảm rủi ro cho nhà xuất khẩu là:', options: ['Giao hàng không ràng buộc thanh toán', 'Thẩm định tín nhiệm người mua và quy định phạt chậm trả trong hợp đồng', 'Không cần điều khoản tranh chấp', 'Chỉ giao dịch miệng'], answer: 1 },
            { question: 'Một nhược điểm của phương thức chuyển tiền so với L/C là:', options: ['Thủ tục luôn phức tạp hơn', 'Không có cam kết thanh toán độc lập của ngân hàng phát hành như L/C', 'Không dùng được ngoại tệ', 'Chỉ áp dụng cho dịch vụ'], answer: 1 },
            { question: 'Ưu điểm nổi bật của phương thức chuyển tiền là:', options: ['Thời gian xử lý linh hoạt, thủ tục tương đối đơn giản', 'Ngân hàng kiểm tra chứng từ rất chặt như L/C', 'Không cần thông tin người thụ hưởng', 'Luôn loại bỏ hoàn toàn rủi ro'], answer: 0 },
            { question: 'Khi lập lệnh chuyển tiền, nội dung sai thông tin tài khoản người thụ hưởng có thể dẫn đến:', options: ['Tiền vẫn đến đúng ngay lập tức', 'Giao dịch bị treo, hoàn trả hoặc chuyển nhầm', 'Ngân hàng tự sửa mà không cần xác nhận', 'Không ảnh hưởng gì'], answer: 1 },
            { question: 'Thông tin nào giúp tăng độ chính xác khi chuyển tiền quốc tế?', options: ['Chỉ ghi tên công ty thụ hưởng', 'Ghi đầy đủ tên thụ hưởng, số tài khoản/IBAN, SWIFT và địa chỉ ngân hàng nhận', 'Chỉ ghi số hợp đồng', 'Chỉ ghi quốc gia'], answer: 1 },
            { question: 'Chọn nhận định đúng:', options: ['Chuyển tiền trả sau luôn an toàn tuyệt đối cho nhà xuất khẩu', 'Chuyển tiền trả trước luôn an toàn tuyệt đối cho nhà nhập khẩu', 'Mỗi hình thức trả trước/trả sau có phân bổ rủi ro khác nhau giữa hai bên', 'Rủi ro chỉ nằm ở ngân hàng'], answer: 2 },
            { question: 'Trong thực tế thương mại, chuyển tiền trả trước 100% thường áp dụng khi:', options: ['Hai bên chưa từng giao dịch và người mua không tin tưởng người bán', 'Người bán có vị thế mạnh, hàng khan hiếm hoặc sản xuất theo đơn hàng riêng', 'Luôn bắt buộc theo UCP 600', 'Hàng đã giao xong'], answer: 1 },
            { question: 'Khi người nhập khẩu yêu cầu ngân hàng chuyển tiền trả sau cho lô hàng đã nhận, đây là hình thức:', options: ['Advance payment', 'Open account theo kỳ hạn trả sau', 'L/C xác nhận', 'Nhờ thu D/P'], answer: 1 },
            { question: 'Trường hợp nào sau đây làm tăng rủi ro trong phương thức chuyển tiền?', options: ['Có hợp đồng rõ điều khoản thanh toán', 'Xác minh đối tác trước khi giao dịch', 'Không quy định rõ thời điểm trả tiền và chứng từ giao nhận', 'Có cơ chế phạt chậm thanh toán'], answer: 2 },
            { question: 'Trong chuyển tiền quốc tế, ngân hàng trung gian (intermediary bank) có thể tham gia khi:', options: ['Hai ngân hàng không có quan hệ tài khoản trực tiếp', 'Người bán yêu cầu giảm giá', 'Hàng hóa cần kiểm dịch', 'Hợp đồng dùng Incoterms FOB'], answer: 0 },
            { question: 'Nếu người nhập khẩu chọn phí BEN, số tiền người xuất khẩu thực nhận thường:', options: ['Bằng đúng số tiền người nhập khẩu ghi lệnh, không trừ phí', 'Có thể thấp hơn do bị trừ phí ngân hàng phía nhận/trung gian', 'Luôn cao hơn số tiền lệnh chuyển', 'Do hải quan quyết định'], answer: 1 },
            { question: 'Mục đích của nội dung nội dung thanh toán/Payment details trên lệnh chuyển tiền là:', options: ['Trang trí chứng từ', 'Hỗ trợ đối chiếu công nợ, hợp đồng, hóa đơn giữa các bên', 'Thay thế hoàn toàn hợp đồng', 'Thay thế vận đơn'], answer: 1 },
            { question: 'Tình huống: Người mua đã chuyển tiền trả trước 100%, nhưng người bán giao hàng thiếu số lượng. Rủi ro chính thuộc về:', options: ['Người bán', 'Người mua', 'Ngân hàng chuyển tiền', 'Ngân hàng nhận tiền'], answer: 1 },
            { question: 'Tình huống: Người bán giao hàng theo thỏa thuận trả sau, đến hạn người mua chậm trả kéo dài. Rủi ro chính thuộc về:', options: ['Người bán', 'Người mua', 'Ngân hàng trung gian', 'Cơ quan hải quan'], answer: 0 },
            { question: 'Tình huống: Lệnh chuyển tiền ghi sai 1 ký tự trong IBAN, ngân hàng yêu cầu tra soát. Kết luận đúng là:', options: ['Đây là rủi ro tác nghiệp có thể làm chậm thanh toán', 'Không ảnh hưởng vì tên người thụ hưởng luôn đủ', 'Tiền chắc chắn vào tài khoản đúng trong ngày', 'Ngân hàng phải bồi thường ngay không điều kiện'], answer: 0 },
            { question: 'Tình huống: Hai bên mới hợp tác lần đầu, giá trị hợp đồng lớn. Phương án thanh toán cân bằng rủi ro hơn chuyển tiền thuần túy là:', options: ['Trả sau toàn bộ không điều khoản bảo đảm', 'Trả trước toàn bộ không ràng buộc', 'Kết hợp đặt cọc và phần còn lại thanh toán theo mốc/chứng từ hoặc chuyển sang phương thức bảo đảm cao hơn (L/C)', 'Chỉ thỏa thuận miệng để linh hoạt'], answer: 2 }
        ];

        let userAnswers = [];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((item, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.id = `question-${index}`;

                const numberDiv = document.createElement('div');
                numberDiv.className = 'question-number';
                numberDiv.textContent = `Câu ${index + 1}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'question-text';
                textDiv.textContent = item.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D'];
                item.options.forEach((option, optionIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = labels[optionIndex] + '. ' + option;
                    btn.onclick = () => selectAnswer(index, optionIndex);
                    btn.id = `option-${index}-${optionIndex}`;
                    optionsDiv.appendChild(btn);
                });

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.id = `feedback-${index}`;

                questionDiv.appendChild(numberDiv);
                questionDiv.appendChild(textDiv);
                questionDiv.appendChild(optionsDiv);
                questionDiv.appendChild(feedbackDiv);

                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;

            ['A', 'B', 'C', 'D'].forEach((_, i) => {
                const btn = document.getElementById(`option-${questionIndex}-${i}`);
                if (btn) {
                    if (i === optionIndex) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                }
            });

            document.getElementById(`question-${questionIndex}`).classList.add('answered');
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(ans => ans !== undefined).length;
            const total = quizData.length;
            const percent = Math.round((answered / total) * 100);

            document.getElementById('current-question').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function submitQuiz() {
            let correct = 0;
            let incorrect = 0;

            quizData.forEach((item, index) => {
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                const questionItem = document.getElementById(`question-${index}`);
                const labels = ['A', 'B', 'C', 'D'];
                const isCorrect = userAnswers[index] === item.answer;

                if (isCorrect) {
                    correct++;
                    const btn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (btn) btn.classList.add('correct');
                    feedbackDiv.className = 'feedback show correct';
                    feedbackDiv.textContent = 'Chính xác!';
                } else {
                    incorrect++;
                    const userBtn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (userBtn) userBtn.classList.add('incorrect');
                    const correctBtn = document.getElementById(`option-${index}-${item.answer}`);
                    if (correctBtn) correctBtn.classList.add('correct');
                    feedbackDiv.className = 'feedback show incorrect';
                    feedbackDiv.textContent = `Sai! Đáp án đúng là: ${labels[item.answer]}`;
                    questionItem.classList.add('incorrect');
                }
            });

            const percentage = Math.round((correct / quizData.length) * 100);
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('percentage').textContent = percentage + '%';

            showResults(correct, percentage);
        }

        function showResults(correct, percentage) {
            const resultsContainer = document.getElementById('results-container');
            const scoreCircle = document.getElementById('score-circle');
            const resultsMessage = document.getElementById('results-message');
            const resultsDetails = document.getElementById('results-details');
            const wrongAnswers = document.getElementById('wrong-answers');
            const labels = ['A', 'B', 'C', 'D'];

            scoreCircle.textContent = correct + '/' + quizData.length;

            if (percentage >= 90) {
                scoreCircle.className = 'score-circle excellent';
                resultsMessage.textContent = 'Xuất sắc!';
            } else if (percentage >= 70) {
                scoreCircle.className = 'score-circle good';
                resultsMessage.textContent = 'Tốt lắm!';
            } else if (percentage >= 50) {
                scoreCircle.className = 'score-circle fair';
                resultsMessage.textContent = 'Cần cố gắng thêm!';
            } else {
                scoreCircle.className = 'score-circle poor';
                resultsMessage.textContent = 'Cần ôn luyện thêm!';
            }

            resultsDetails.innerHTML = `<p>Bạn trả lời đúng <strong>${correct}</strong> trên <strong>${quizData.length}</strong> câu (${percentage}%)</p>`;

            const wrongList = [];
            quizData.forEach((item, index) => {
                const userAnswer = userAnswers[index];
                if (userAnswer !== item.answer) {
                    const selected = userAnswer !== undefined
                        ? `${labels[userAnswer]} - ${item.options[userAnswer]}`
                        : 'Chưa chọn';

                    wrongList.push(`
                        <div class="wrong-item">
                            <div><strong>Câu ${index + 1}:</strong> ${item.question}</div>
                            <div>Bạn chọn: <strong>${selected}</strong></div>
                            <div>Đáp án đúng: <strong>${labels[item.answer]}</strong> - ${item.options[item.answer]}</div>
                        </div>
                    `);
                }
            });

            if (wrongList.length > 0) {
                wrongAnswers.style.display = 'block';
                wrongAnswers.innerHTML = `<h3>Các câu sai (${wrongList.length})</h3>${wrongList.join('')}`;
            } else {
                wrongAnswers.style.display = 'none';
                wrongAnswers.innerHTML = '';
            }

            resultsContainer.classList.add('show');
            document.getElementById('quiz-container').style.display = 'none';
        }

        function resetQuiz() {
            userAnswers = [];

            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('results-container').classList.remove('show');

            document.getElementById('current-question').textContent = '0';
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('incorrect-count').textContent = '0';
            document.getElementById('percentage').textContent = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('wrong-answers').style.display = 'none';
            document.getElementById('wrong-answers').innerHTML = '';

            renderQuiz();
        }

        window.addEventListener('load', renderQuiz);
    </script>
</body>
</html>
