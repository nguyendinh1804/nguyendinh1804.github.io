<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương 1 - 30 câu trắc nghiệm thanh toán quốc tế</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .main-menu {
            background: #f5f7ff;
            border-bottom: 1px solid #dfe4ff;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .menu-link {
            text-decoration: none;
            color: #3f51b5;
            background: white;
            border: 1px solid #cdd7ff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .menu-link:hover {
            background: #e8edff;
            border-color: #9fb2ff;
        }

        .menu-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .content {
            padding: 30px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-item {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .question-item.answered {
            border-left-color: #4caf50;
        }

        .question-item.answered.incorrect {
            border-left-color: #f44336;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            padding: 12px 15px;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-container.show {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .score-circle.excellent { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); }
        .score-circle.good { background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%); }
        .score-circle.fair { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); }
        .score-circle.poor { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }

        .results-message {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .results-details {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .wrong-answers {
            text-align: left;
            background: #fff7f7;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 18px;
        }

        .wrong-answers h3 {
            font-size: 18px;
            color: #b71c1c;
            margin-bottom: 12px;
        }

        .wrong-item {
            padding: 10px 0;
            border-bottom: 1px dashed #f0b4b4;
            line-height: 1.5;
            color: #333;
        }

        .wrong-item:last-child {
            border-bottom: none;
        }

        .wrong-item strong {
            color: #c62828;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 21px;
            }

            .content {
                padding: 20px;
            }

            .quiz-info {
                flex-direction: column;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .buttons-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Chương 1 - Trắc nghiệm thanh toán quốc tế</h1>
            <p>Bộ 30 câu hỏi A/B/C/D</p>
        </div>

        <nav class="main-menu">
            <a class="menu-link" href="index.html">Trang này</a>
            <a class="menu-link active" href="chuong-1.html">Chương 1</a>
            <a class="menu-link" href="chuong-2.html">Chương 2</a>
            <a class="menu-link" href="chuong-3.html">Chương 3</a>
            <a class="menu-link" href="chuong-4.html">Chương 4</a>
            <a class="menu-link" href="chuong-5.html">Chương 5</a>
            <a class="menu-link" href="chuong-6.html">Chương 6</a>
        </nav>

        <div class="content">
            <div class="quiz-info">
                <div class="info-item">
                    <span class="info-label">Câu hỏi</span>
                    <span class="info-value"><span id="current-question">0</span>/30</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Câu đúng</span>
                    <span class="info-value" style="color: #4caf50;" id="correct-count">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Câu sai</span>
                    <span class="info-value" style="color: #f44336;" id="incorrect-count">0</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Tỷ lệ</span>
                    <span class="info-value" id="percentage">0%</span>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <div id="quiz-container"></div>

            <div id="results-container" class="results-container">
                <div class="score-circle" id="score-circle">0/30</div>
                <div class="results-message" id="results-message"></div>
                <div class="results-details" id="results-details"></div>
                <div class="wrong-answers" id="wrong-answers" style="display: none;"></div>
            </div>

            <div class="buttons-container">
                <button class="btn btn-secondary" id="btn-reset" onclick="resetQuiz()">Làm lại</button>
                <button class="btn btn-primary" id="btn-submit" onclick="submitQuiz()">Nộp bài</button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            { question: "Hoạt động nào là cơ sở hình thành thanh toán quốc tế?", options: ["Ngoại thương", "Đầu tư ra nước ngoài", "Du lịch quốc tế", "Viện trợ quốc tế"], answer: 0 },
            { question: "Trong điều kiện FOB, người bán hoàn thành nghĩa vụ giao hàng khi nào?", options: ["Khi giao hàng cho người chuyên chở đầu tiên", "Khi hàng qua lan can tàu/có mặt trên tàu tại cảng bốc", "Khi hàng đến cảng dỡ", "Khi người mua nhận chứng từ"], answer: 1 },
            { question: "Trong điều kiện CIF, người bán phải mua bảo hiểm cho chặng nào?", options: ["Chỉ trong nội địa nước xuất khẩu", "Từ kho người bán đến kho người mua", "Từ cảng đi đến cảng đến theo hợp đồng", "Không phải mua bảo hiểm"], answer: 2 },
            { question: "Theo CIF, thời điểm chuyển rủi ro từ người bán sang người mua là:", options: ["Khi tàu cập cảng đến", "Khi giao chứng từ", "Khi ký hợp đồng", "Khi hàng được xếp lên tàu tại cảng đi"], answer: 3 },
            { question: "Cơ quan có chức năng chủ trì quản lý tiền tệ đối với thanh toán quốc tế của quốc gia là:", options: ["Ngân hàng trung ương", "Ngân hàng thương mại", "Công ty bảo hiểm", "Hiệp hội doanh nghiệp"], answer: 0 },
            { question: "Yếu tố nào sau đây KHÔNG phải đặc điểm của thanh toán quốc tế?", options: ["Chịu ảnh hưởng luật pháp quốc gia và quốc tế", "Chỉ liên quan đến nội tệ của một nước", "Liên quan ngoại tệ và tỷ giá", "Thường thực hiện qua hệ thống ngân hàng"], answer: 1 },
            { question: "Rủi ro do bất ổn chính trị, chiến tranh, cấm vận gây ra thuộc nhóm nào?", options: ["Rủi ro tác nghiệp", "Rủi ro tín dụng", "Rủi ro quốc gia", "Rủi ro thanh khoản"], answer: 2 },
            { question: "Rủi ro phát sinh do đối tác không thực hiện nghĩa vụ thanh toán gọi là:", options: ["Rủi ro quốc gia", "Rủi ro tỷ giá", "Rủi ro pháp lý", "Rủi ro tín dụng"], answer: 3 },
            { question: "Incoterms 2020 do tổ chức nào ban hành?", options: ["ICC", "IMF", "WTO", "WB"], answer: 0 },
            { question: "Nếu doanh nghiệp xuất khẩu Việt Nam muốn giảm chi phí vận tải và bảo hiểm, điều kiện nào thường được chọn?", options: ["CIF", "FOB", "DDP", "CFR"], answer: 1 },
            { question: "Khi dùng FOB, người mua chịu trách nhiệm thuê tàu và mua bảo hiểm từ đâu?", options: ["Từ khi ký hợp đồng", "Từ kho người bán", "Từ sau khi hàng được xếp lên tàu", "Từ cảng dỡ về kho"], answer: 2 },
            { question: "Trong CIF, người bán phải cung cấp cho người mua loại chứng từ nào liên quan bảo hiểm?", options: ["Giấy phép nhập khẩu", "Hợp đồng đại lý", "Chứng thư kiểm dịch", "Chứng từ bảo hiểm"], answer: 3 },
            { question: "Vai trò quan trọng của ngân hàng thương mại trong thanh toán quốc tế là:", options: ["Trung gian thanh toán và tài trợ thương mại", "Ban hành luật ngoại hối", "Quản lý dự trữ ngoại hối quốc gia", "Cấp phép hãng tàu"], answer: 0 },
            { question: "Phương thức thanh toán nào giúp giảm rủi ro cho người xuất khẩu tốt hơn chuyển tiền trả sau?", options: ["Nhờ thu trơn", "Tín dụng chứng từ (L/C)", "Ghi sổ", "Trả chậm không bảo lãnh"], answer: 1 },
            { question: "Rủi ro tỷ giá trong thanh toán quốc tế là:", options: ["Do thiên tai tại cảng đi", "Do sai sót chứng từ vận tải", "Do biến động tỷ giá làm thay đổi giá trị khoản thu/chi", "Do ngân hàng chậm mở cửa"], answer: 2 },
            { question: "Trong điều kiện FOB, chi phí bốc hàng lên tàu tại cảng đi thường do ai chịu?", options: ["Bên bảo hiểm", "Người mua", "Hãng tàu", "Người bán"], answer: 3 },
            { question: "Trong CIF, chi phí cước biển đến cảng đích do ai trả?", options: ["Người bán", "Người mua", "Ngân hàng phát hành L/C", "Công ty bảo hiểm"], answer: 0 },
            { question: "Một biện pháp giảm rủi ro không thanh toán của người mua là:", options: ["Chỉ giao dịch bằng miệng", "Dùng L/C không hủy ngang, xác nhận khi cần", "Giao hàng trước, nhận tiền sau không điều kiện", "Không kiểm tra năng lực tài chính đối tác"], answer: 1 },
            { question: "Rủi ro pháp lý trong thanh toán quốc tế có thể phát sinh từ:", options: ["Tắc nghẽn cảng", "Biến động giá dầu", "Khác biệt hệ thống luật giữa các nước", "Hỏng container"], answer: 2 },
            { question: "Theo thực tiễn, doanh nghiệp nên làm gì trước khi ký hợp đồng ngoại thương để hạn chế rủi ro?", options: ["Bỏ qua điều khoản phạt", "Không cần thẩm định đối tác", "Chỉ xem giá thấp nhất", "Thẩm định tín nhiệm và lịch sử giao dịch đối tác"], answer: 3 },
            { question: "Chứng từ nào là bằng chứng quan trọng người bán đã giao hàng lên tàu?", options: ["Vận đơn đường biển (B/L)", "Hóa đơn thương mại", "Phiếu đóng gói", "Giấy chứng nhận xuất xứ"], answer: 0 },
            { question: "Trong thanh toán quốc tế, ngân hàng thường thu phí dịch vụ vì:", options: ["Phí là bắt buộc theo luật hình sự", "Ngân hàng cung cấp dịch vụ trung gian, kiểm tra chứng từ, chuyển tiền", "Doanh nghiệp không được phép tự thanh toán", "Để thay thế thuế xuất nhập khẩu"], answer: 1 },
            { question: "Nếu đồng tiền thanh toán tăng giá so với nội tệ trong thời gian chờ trả nợ nhập khẩu, nhà nhập khẩu chịu:", options: ["Không ảnh hưởng", "Lợi ích tỷ giá", "Thiệt hại tỷ giá", "Chỉ ảnh hưởng thuế"], answer: 2 },
            { question: "Rủi ro tác nghiệp trong ngân hàng thanh toán quốc tế thường liên quan:", options: ["Thuế tiêu thụ đặc biệt", "Chiến tranh khu vực", "Lạm phát toàn cầu", "Sai sót nhập liệu, xử lý chứng từ, hệ thống kỹ thuật"], answer: 3 },
            { question: "Điểm khác biệt chính giữa FOB và CIF là:", options: ["CIF yêu cầu người bán trả cước và mua bảo hiểm chặng biển", "FOB không dùng đường biển", "FOB yêu cầu người bán giao tại kho người mua", "CIF không cần chứng từ vận tải"], answer: 0 },
            { question: "Trong hợp đồng ngoại thương, điều khoản nào giúp giảm tranh chấp khi có vi phạm thanh toán?", options: ["Điều khoản quảng cáo", "Điều khoản luật áp dụng và giải quyết tranh chấp", "Điều khoản màu bao bì", "Điều khoản khuyến mãi"], answer: 1 },
            { question: "Mục tiêu chính của phòng ngừa rủi ro tỷ giá là:", options: ["Kéo dài thời gian thanh toán", "Tăng số lượng chứng từ", "Cố định/giảm biến động giá trị dòng tiền ngoại tệ", "Tăng chi phí bảo hiểm"], answer: 2 },
            { question: "Khi doanh nghiệp xuất khẩu chọn FOB, rủi ro vận chuyển biển sau điểm giao thuộc về:", options: ["Hải quan", "Người bán", "Ngân hàng thông báo", "Người mua"], answer: 3 },
            { question: "Một biện pháp phòng ngừa rủi ro quốc gia là:", options: ["Đa dạng hóa thị trường và dùng bảo hiểm rủi ro phù hợp", "Tăng mua hàng từ một thị trường duy nhất", "Bỏ điều khoản thanh toán trong hợp đồng", "Chỉ thanh toán tiền mặt"], answer: 0 },
            { question: "Phát biểu đúng về vai trò thanh toán quốc tế đối với ngoại thương là:", options: ["Không ảnh hưởng tốc độ luân chuyển hàng hóa", "Là công cụ hoàn tất giá trị hàng hóa giữa bên mua và bên bán ở các quốc gia khác nhau", "Chỉ dùng cho dịch vụ, không dùng cho hàng hóa", "Không cần ngân hàng tham gia"], answer: 1 }
        ];

        let userAnswers = [];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((item, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.id = `question-${index}`;

                const numberDiv = document.createElement('div');
                numberDiv.className = 'question-number';
                numberDiv.textContent = `Câu ${index + 1}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'question-text';
                textDiv.textContent = item.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D'];
                item.options.forEach((option, optionIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = labels[optionIndex] + '. ' + option;
                    btn.onclick = () => selectAnswer(index, optionIndex);
                    btn.id = `option-${index}-${optionIndex}`;
                    optionsDiv.appendChild(btn);
                });

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.id = `feedback-${index}`;

                questionDiv.appendChild(numberDiv);
                questionDiv.appendChild(textDiv);
                questionDiv.appendChild(optionsDiv);
                questionDiv.appendChild(feedbackDiv);

                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;

            ['A', 'B', 'C', 'D'].forEach((_, i) => {
                const btn = document.getElementById(`option-${questionIndex}-${i}`);
                if (btn) {
                    if (i === optionIndex) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                }
            });

            document.getElementById(`question-${questionIndex}`).classList.add('answered');

            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(ans => ans !== undefined).length;
            const total = quizData.length;
            const percent = Math.round((answered / total) * 100);

            document.getElementById('current-question').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function submitQuiz() {
            let correct = 0;
            let incorrect = 0;

            quizData.forEach((item, index) => {
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                const questionItem = document.getElementById(`question-${index}`);
                const labels = ['A', 'B', 'C', 'D'];
                const isCorrect = userAnswers[index] === item.answer;

                if (isCorrect) {
                    correct++;
                    const btn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (btn) btn.classList.add('correct');
                    feedbackDiv.className = 'feedback show correct';
                    feedbackDiv.textContent = 'Chính xác!';
                } else {
                    incorrect++;
                    const userBtn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (userBtn) userBtn.classList.add('incorrect');
                    const correctBtn = document.getElementById(`option-${index}-${item.answer}`);
                    if (correctBtn) correctBtn.classList.add('correct');
                    feedbackDiv.className = 'feedback show incorrect';
                    feedbackDiv.textContent = `Sai! Đáp án đúng là: ${labels[item.answer]}`;
                    questionItem.classList.add('incorrect');
                }
            });

            const percentage = Math.round((correct / quizData.length) * 100);
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('percentage').textContent = percentage + '%';

            showResults(correct, percentage);
        }

        function showResults(correct, percentage) {
            const resultsContainer = document.getElementById('results-container');
            const scoreCircle = document.getElementById('score-circle');
            const resultsMessage = document.getElementById('results-message');
            const resultsDetails = document.getElementById('results-details');
            const wrongAnswers = document.getElementById('wrong-answers');
            const labels = ['A', 'B', 'C', 'D'];

            scoreCircle.textContent = correct + '/' + quizData.length;

            if (percentage >= 90) {
                scoreCircle.className = 'score-circle excellent';
                resultsMessage.textContent = 'Xuất sắc!';
            } else if (percentage >= 70) {
                scoreCircle.className = 'score-circle good';
                resultsMessage.textContent = 'Tốt lắm!';
            } else if (percentage >= 50) {
                scoreCircle.className = 'score-circle fair';
                resultsMessage.textContent = 'Cần cố gắng thêm!';
            } else {
                scoreCircle.className = 'score-circle poor';
                resultsMessage.textContent = 'Cần ôn luyện thêm!';
            }

            resultsDetails.innerHTML = `<p>Bạn trả lời đúng <strong>${correct}</strong> trên <strong>${quizData.length}</strong> câu (${percentage}%)</p>`;

            const wrongList = [];
            quizData.forEach((item, index) => {
                const userAnswer = userAnswers[index];
                if (userAnswer !== item.answer) {
                    const selected = userAnswer !== undefined
                        ? `${labels[userAnswer]} - ${item.options[userAnswer]}`
                        : 'Chưa chọn';

                    wrongList.push(`
                        <div class="wrong-item">
                            <div><strong>Câu ${index + 1}:</strong> ${item.question}</div>
                            <div>Bạn chọn: <strong>${selected}</strong></div>
                            <div>Đáp án đúng: <strong>${labels[item.answer]}</strong> - ${item.options[item.answer]}</div>
                        </div>
                    `);
                }
            });

            if (wrongList.length > 0) {
                wrongAnswers.style.display = 'block';
                wrongAnswers.innerHTML = `<h3>Các câu sai (${wrongList.length})</h3>${wrongList.join('')}`;
            } else {
                wrongAnswers.style.display = 'none';
                wrongAnswers.innerHTML = '';
            }

            resultsContainer.classList.add('show');
            document.getElementById('quiz-container').style.display = 'none';
        }

        function resetQuiz() {
            userAnswers = [];

            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('results-container').classList.remove('show');

            document.getElementById('current-question').textContent = '0';
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('incorrect-count').textContent = '0';
            document.getElementById('percentage').textContent = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('wrong-answers').style.display = 'none';
            document.getElementById('wrong-answers').innerHTML = '';

            renderQuiz();
        }

        window.addEventListener('load', renderQuiz);
    </script>
</body>
</html>
