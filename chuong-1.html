<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chương 1 - 40 câu trắc nghiệm CĐS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .main-menu {
            background: #f5f7ff;
            border-bottom: 1px solid #dfe4ff;
            padding: 14px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .menu-link {
            text-decoration: none;
            color: #3f51b5;
            background: white;
            border: 1px solid #cdd7ff;
            border-radius: 999px;
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .menu-link:hover {
            background: #e8edff;
            border-color: #9fb2ff;
        }

        .menu-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }

        .content {
            padding: 30px;
        }

        .quiz-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-item {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .question-item.answered {
            border-left-color: #4caf50;
        }

        .question-item.answered.incorrect {
            border-left-color: #f44336;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            padding: 12px 15px;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-container.show {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .score-circle.excellent { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); }
        .score-circle.good { background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%); }
        .score-circle.fair { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); }
        .score-circle.poor { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }

        .results-message {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .results-details {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .wrong-answers {
            text-align: left;
            background: #fff7f7;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 18px;
        }

        .wrong-answers h3 {
            font-size: 18px;
            color: #b71c1c;
            margin-bottom: 12px;
        }

        .wrong-item {
            padding: 10px 0;
            border-bottom: 1px dashed #f0b4b4;
            line-height: 1.5;
            color: #333;
        }

        .wrong-item:last-child {
            border-bottom: none;
        }

        .wrong-item strong {
            color: #c62828;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 21px;
            }

            .content {
                padding: 20px;
            }

            .quiz-info {
                flex-direction: column;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .buttons-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

        <div class="header">

            </div>

    <script>
        const quizData = [
            { question: "CĐS là viết tắt của cụm từ nào?", options: ["Công đoạn số", "Chuyển đổi số", "Công nghệ số", "Cơ điện số"], answer: 1 },

            { question: "Yếu tố nào KHÔNG phải là trụ cột của CĐS?", options: ["Công nghệ", "Con người", "Quy trình", "Thời tiết"], answer: 3 },
            { question: "Trong CĐS, dữ liệu được xem là gì?", options: ["Tài nguyên", "Chi phí", "Rủi ro", "Phụ trợ"], answer: 0 },
            { question: "Công nghệ nào thường được nhắc đến trong CĐS?", options: ["AI", "Blockchain", "IoT", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Vì sao doanh nghiệp cần CĐS?", options: ["Để tồn tại và phát triển trong môi trường cạnh tranh", "Để giảm nhân sự", "Để thay đổi thương hiệu", "Để tăng giá sản phẩm"], answer: 0 },
            { question: "Chính phủ điện tử là một ví dụ của?", options: ["CĐS trong doanh nghiệp", "CĐS trong giáo dục", "CĐS trong quản lý nhà nước", "CĐS trong y tế"], answer: 2 },
            { question: "Lợi ích của CĐS đối với khách hàng là gì?", options: ["Trải nghiệm tốt hơn", "Dịch vụ nhanh hơn", "Cá nhân hóa sản phẩm", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Một trong những thách thức lớn nhất của CĐS là?", options: ["Thiếu công nghệ", "Kháng cự thay đổi từ con người", "Thiếu vốn đầu tư", "Thiếu dữ liệu"], answer: 1 },
            { question: "CĐS trong giáo dục giúp gì?", options: ["Học tập mọi lúc mọi nơi", "Cá nhân hóa chương trình học", "Tăng tính tương tác", "Tất cả các đáp án trên"], answer: 3 },

            { question: "Một ví dụ về CĐS trong y tế là?", options: ["Hồ sơ bệnh án điện tử", "Khám bệnh trực tuyến", "Ứng dụng theo dõi sức khỏe", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Blockchain trong CĐS thường được ứng dụng vào?", options: ["Quản lý chuỗi cung ứng", "Giao dịch tài chính", "Xác thực thông tin", "Tất cả các đáp án trên"], answer: 3 },
            { question: "AI trong CĐS giúp gì?", options: ["Tự động hóa quy trình", "Dự đoán hành vi khách hàng", "Phân tích dữ liệu nhanh chóng", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Một doanh nghiệp nhỏ muốn CĐS nhưng thiếu vốn, giải pháp nào phù hợp nhất?", options: ["Tự phát triển công nghệ", "Sử dụng dịch vụ điện toán đám mây", "Tuyển chuyên gia công nghệ riêng", "Mua hệ thống lớn"], answer: 1 },
            { question: "Trong CĐS, yếu tố nào quyết định thành công lâu dài?", options: ["Công nghệ hiện đại", "Văn hóa doanh nghiệp", "Vốn đầu tư", "Chính sách nhà nước"], answer: 1 },
            { question: "Khi triển khai CĐS, doanh nghiệp cần chú ý đến vấn đề nào về dữ liệu?", options: ["Bảo mật và quyền riêng tư", "Tốc độ xử lý", "Dung lượng lưu trữ", "Định dạng dữ liệu"], answer: 0 },
            { question: "Một ví dụ về thất bại trong CĐS là?", options: ["Đầu tư công nghệ nhưng không đào tạo nhân sự", "Không có chiến lược rõ ràng", "Thiếu sự đồng thuận trong tổ chức", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Trong bối cảnh toàn cầu hóa, CĐS giúp doanh nghiệp gì?", options: ["Mở rộng thị trường quốc tế", "Tăng khả năng cạnh tranh", "Tối ưu hóa chuỗi cung ứng", "Tất cả các đáp án trên"], answer: 3 },
            { question: "“Digitization” là gì?", options: ["Chuyển dữ liệu giấy sang dạng số", "Tăng tự động hóa quy trình", "Đổi mô hình kinh doanh", "Lưu trữ dữ liệu lên đám mây"], answer: 0 },
            { question: "“Digitalization” nhấn mạnh vào yếu tố nào?", options: ["Tăng tự động hóa quy trình", "Mua phần cứng mới", "Dựng website tĩnh", "Thuê ngoài CNTT"], answer: 0 },
            { question: "Chuyển đổi số tăng tốc mạnh trong bối cảnh nào?", options: ["CMCN 3.0", "CMCN 4.0", "Internet 1.0", "Máy in phun"], answer: 1 },
            { question: "Ba trụ cột của CĐS là?", options: ["Sản phẩm – Giá – Kênh", "Dữ liệu – Pháp lý – Tài chính", "Con người – Quy trình – Công nghệ", "Marketing – Bán hàng – Truyền thông"], answer: 2 },
            { question: "Ví dụ “không dùng tiền mặt” là gì?", options: ["Tiền mặt tại quầy", "Séc giấy", "Ví điện tử (eWallet)", "Phiếu giấy"], answer: 2 },
            { question: "Lợi ích nổi bật của CĐS với Chính phủ là?", options: ["Tăng giấy tờ thủ tục", "Dịch vụ số tốt, quyết định kịp thời", "Cắt giảm dịch vụ công", "Thu thuế cao hơn mọi nơi"], answer: 1 },
            { question: "Ngày Chuyển đổi số quốc gia ở Việt Nam là?", options: ["01/01", "10/10", "20/10", "10/11"], answer: 1 },

            { question: "Thách thức lớn nhất khi triển khai CĐS tại Việt Nam là?", options: ["Thiếu chiến lược rõ ràng", "Thiếu lãnh đạo có năng lực", "Thiếu cơ sở hạ tầng và chi phí vận hành", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Yếu tố dữ liệu trong CĐS yêu cầu gì?", options: ["Khối lượng đủ lớn", "Tính xác thực và đáng tin cậy", "Khả năng truy cập và phân tích", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Khách hàng trong CĐS đóng vai trò gì?", options: ["Kim chỉ nam cho chiến lược", "Động lực cốt lõi của quá trình", "Quyết định trải nghiệm và sản phẩm", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Nhân lực và văn hóa ảnh hưởng đến CĐS như thế nào?", options: ["Quyết định sự thành bại", "Đòi hỏi kỹ năng số mới", "Cần văn hóa chấp nhận rủi ro", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Công nghệ nền tảng trong CĐS gồm?", options: ["Cloud, AI, IoT, Blockchain", "Điện thoại, máy in, máy fax", "Website, email, mạng LAN", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Chính sách pháp luật trong CĐS cần chú trọng điều gì?", options: ["Giao dịch điện tử", "Chữ ký số", "Bảo vệ dữ liệu cá nhân", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Một ví dụ về thất bại trong CĐS là?", options: ["Đầu tư công nghệ nhưng không đào tạo nhân sự", "Không có chiến lược rõ ràng", "Thiếu sự đồng thuận trong tổ chức", "Tất cả các đáp án trên"], answer: 3 },
            { question: "CĐS trong bối cảnh Covid-19 giúp gì?", options: ["Chính phủ số cung cấp dịch vụ công trực tuyến", "Kinh tế số qua thương mại điện tử và giao hàng", "Nền tảng số hỗ trợ làm việc tại nhà", "Tất cả các đáp án trên"], answer: 3 },
            { question: "Xu hướng công nghệ của CMCN 4.0 gồm?", options: ["IoT, AI, Blockchain, Big Data", "Điện thoại bàn, máy fax", "Máy hơi nước, luyện thép", "Tất cả các đáp án trên"], answer: 0 },
            { question: "Yếu tố quyết định thành công lâu dài của CĐS là?", options: ["Công nghệ hiện đại", "Văn hóa doanh nghiệp và con người", "Vốn đầu tư lớn", "Chính sách nhà nước"], answer: 1 }
        ];

        let userAnswers = [];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((item, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.id = `question-${index}`;

                const numberDiv = document.createElement('div');
                numberDiv.className = 'question-number';
                numberDiv.textContent = `Câu ${index + 1}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'question-text';
                textDiv.textContent = item.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D'];
                item.options.forEach((option, optionIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = labels[optionIndex] + '. ' + option;
                    btn.onclick = () => selectAnswer(index, optionIndex);
                    btn.id = `option-${index}-${optionIndex}`;
                    optionsDiv.appendChild(btn);
                });

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.id = `feedback-${index}`;

                questionDiv.appendChild(numberDiv);
                questionDiv.appendChild(textDiv);
                questionDiv.appendChild(optionsDiv);
                questionDiv.appendChild(feedbackDiv);

                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;

            ['A', 'B', 'C', 'D'].forEach((_, i) => {
                const btn = document.getElementById(`option-${questionIndex}-${i}`);
                if (btn) {
                    if (i === optionIndex) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                }
            });

            document.getElementById(`question-${questionIndex}`).classList.add('answered');

            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(ans => ans !== undefined).length;
            const total = quizData.length;
            const percent = Math.round((answered / total) * 100);

            document.getElementById('current-question').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function submitQuiz() {
            let correct = 0;
            let incorrect = 0;

            quizData.forEach((item, index) => {
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                const questionItem = document.getElementById(`question-${index}`);
                const labels = ['A', 'B', 'C', 'D'];
                const isCorrect = userAnswers[index] === item.answer;

                if (isCorrect) {
                    correct++;
                    const btn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (btn) btn.classList.add('correct');
                    feedbackDiv.className = 'feedback show correct';
                    feedbackDiv.textContent = 'Chính xác!';
                } else {
                    incorrect++;
                    const userBtn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (userBtn) userBtn.classList.add('incorrect');
                    const correctBtn = document.getElementById(`option-${index}-${item.answer}`);
                    if (correctBtn) correctBtn.classList.add('correct');
                    feedbackDiv.className = 'feedback show incorrect';
                    feedbackDiv.textContent = `Sai! Đáp án đúng là: ${labels[item.answer]}`;
                    questionItem.classList.add('incorrect');
                }
            });

            const percentage = Math.round((correct / quizData.length) * 100);
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('percentage').textContent = percentage + '%';

            showResults(correct, percentage);
        }

        function showResults(correct, percentage) {
            const resultsContainer = document.getElementById('results-container');
            const scoreCircle = document.getElementById('score-circle');
            const resultsMessage = document.getElementById('results-message');
            const resultsDetails = document.getElementById('results-details');
            const wrongAnswers = document.getElementById('wrong-answers');
            const labels = ['A', 'B', 'C', 'D'];

            scoreCircle.textContent = correct + '/' + quizData.length;

            if (percentage >= 90) {
                scoreCircle.className = 'score-circle excellent';
                resultsMessage.textContent = 'Xuất sắc!';
            } else if (percentage >= 70) {
                scoreCircle.className = 'score-circle good';
                resultsMessage.textContent = 'Tốt lắm!';
            } else if (percentage >= 50) {
                scoreCircle.className = 'score-circle fair';
                resultsMessage.textContent = 'Cần cố gắng thêm!';
            } else {
                scoreCircle.className = 'score-circle poor';
                resultsMessage.textContent = 'Cần ôn luyện thêm!';
            }

            resultsDetails.innerHTML = `<p>Bạn trả lời đúng <strong>${correct}</strong> trên <strong>${quizData.length}</strong> câu (${percentage}%)</p>`;

            const wrongList = [];
            quizData.forEach((item, index) => {
                const userAnswer = userAnswers[index];
                if (userAnswer !== item.answer) {
                    const selected = userAnswer !== undefined
                        ? `${labels[userAnswer]} - ${item.options[userAnswer]}`
                        : 'Chưa chọn';

                    wrongList.push(`
                        <div class="wrong-item">
                            <div><strong>Câu ${index + 1}:</strong> ${item.question}</div>
                            <div>Bạn chọn: <strong>${selected}</strong></div>
                            <div>Đáp án đúng: <strong>${labels[item.answer]}</strong> - ${item.options[item.answer]}</div>
                        </div>
                    `);
                }
            });

            if (wrongList.length > 0) {
                wrongAnswers.style.display = 'block';
                wrongAnswers.innerHTML = `<h3>Các câu sai (${wrongList.length})</h3>${wrongList.join('')}`;
            } else {
                wrongAnswers.style.display = 'none';
                wrongAnswers.innerHTML = '';
            }

            resultsContainer.classList.add('show');
            document.getElementById('quiz-container').style.display = 'none';
        }

        function resetQuiz() {
            userAnswers = [];

            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('results-container').classList.remove('show');

            document.getElementById('current-question').textContent = '0';
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('incorrect-count').textContent = '0';
            document.getElementById('percentage').textContent = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('wrong-answers').style.display = 'none';
            document.getElementById('wrong-answers').innerHTML = '';

            renderQuiz();
        }

        window.addEventListener('load', renderQuiz);
    </script>
</body>
</html>
