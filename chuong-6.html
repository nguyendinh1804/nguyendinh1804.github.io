    <style>

        }

        .header p {

        }

        .main-menu {
            background: #f5f7ff;

            flex-wrap: wrap;
            gap: 10px;

        .menu-link {
            text-decoration: none;
            color: #3f51b5;
            background: white;
            border: 1px solid #cdd7ff;

            padding: 8px 14px;
            font-size: 14px;

        .menu-link:hover {
            background: #e8edff;
            border-color: #9fb2ff;
        }

        .menu-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        }

        .content {
            padding: 30px;
        }

        .quiz-info {

            border-radius: 8px;
            flex-wrap: wrap;

        .info-item {

            flex-direction: column;
        }

        .info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-item {
            margin-bottom: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;

        .question-item.answered {

        }

        .question-item.answered.incorrect {
            border-left-color: #f44336;
        }

        .question-number {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.5;
            font-weight: 500;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .option-btn {
            padding: 12px 15px;
            border: 2px solid #ddd;
            background: white;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .option-btn.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-btn.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .feedback.incorrect {
            background: #ffebee;
            color: #c62828;
        }

        .buttons-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #ddd;
        }

        .results-container {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .results-container.show {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 48px;
            font-weight: bold;
            color: white;
        }

        .score-circle.excellent { background: linear-gradient(135deg, #4caf50 0%, #45a049 100%); }
        .score-circle.good { background: linear-gradient(135deg, #2196f3 0%, #1976d2 100%); }
        .score-circle.fair { background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%); }
        .score-circle.poor { background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%); }

        .results-message {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .results-details {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .wrong-answers {
            text-align: left;
            background: #fff7f7;
            border: 1px solid #ffd6d6;
            border-radius: 8px;
            padding: 16px;
            margin-top: 18px;
        }

        .wrong-answers h3 {
            font-size: 18px;
            color: #b71c1c;
            margin-bottom: 12px;
        }

        .wrong-item {
            padding: 10px 0;
            border-bottom: 1px dashed #f0b4b4;
            line-height: 1.5;
            color: #333;
        }

        .wrong-item:last-child {
            border-bottom: none;
        }

        .wrong-item strong {
            color: #c62828;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 21px;
            }

            .content {
                padding: 20px;
            }

            .quiz-info {
                flex-direction: column;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .buttons-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>

    <script>
        const quizData = [
            { question: 'Theo UCP 600, nguyên tắc cốt lõi khi ngân hàng xử lý L/C là:', options: ['Kiểm tra hàng hóa thực tế tại cảng', 'Kiểm tra sự phù hợp trên bề mặt của bộ chứng từ với điều khoản L/C', 'Bảo đảm người mua luôn có lãi', 'Định giá lại hợp đồng ngoại thương'], answer: 1 },
            { question: 'Nguyên tắc độc lập của L/C được hiểu là:', options: ['L/C phụ thuộc hoàn toàn vào hợp đồng mua bán', 'L/C độc lập với hợp đồng cơ sở, ngân hàng giao dịch trên chứng từ', 'L/C chỉ có hiệu lực khi hàng đã bán xong', 'L/C không liên quan ngân hàng'], answer: 1 },
            { question: 'Trong giao dịch L/C, Applicant là:', options: ['Ngân hàng phát hành', 'Người yêu cầu mở L/C (thường là nhà nhập khẩu)', 'Người thụ hưởng', 'Hãng tàu'], answer: 1 },
            { question: 'Beneficiary trong L/C là:', options: ['Người hưởng lợi từ L/C (thường là nhà xuất khẩu)', 'Ngân hàng trung ương', 'Đơn vị kiểm dịch', 'Người giám định'], answer: 0 },
            { question: 'Issuing Bank là ngân hàng:', options: ['Thông báo L/C nhưng không cam kết thanh toán', 'Phát hành L/C theo yêu cầu Applicant và cam kết thanh toán khi chứng từ phù hợp', 'Chỉ xử lý vận đơn', 'Chỉ xử lý ngoại hối tiền mặt'], answer: 1 },
            { question: 'Advising Bank có vai trò chính là:', options: ['Bắt buộc thanh toán thay issuing bank', 'Thông báo L/C cho người thụ hưởng và xác thực tính chân thực bề ngoài của điện L/C', 'Quyết định sửa đổi điều khoản L/C', 'Phát hành C/O'], answer: 1 },
            { question: 'Confirming Bank trong L/C có xác nhận là ngân hàng:', options: ['Chỉ thông báo L/C', 'Bổ sung cam kết thanh toán riêng, độc lập với issuing bank', 'Làm dịch vụ vận tải', 'Bắt buộc phải là ngân hàng nước người mua'], answer: 1 },
            { question: 'L/C không hủy ngang (Irrevocable L/C) nghĩa là:', options: ['Applicant được hủy bất kỳ lúc nào', 'Không thể sửa đổi/hủy nếu không có sự đồng ý của các bên liên quan theo quy định', 'Chỉ áp dụng cho giao dịch nội địa', 'Không cần bộ chứng từ'], answer: 1 },
            { question: 'Theo UCP 600 Điều 14, thời hạn tối đa ngân hàng có để kiểm tra chứng từ là:', options: ['3 ngày làm việc ngân hàng', '5 ngày làm việc ngân hàng kể từ ngày xuất trình', '7 ngày dương lịch', '10 ngày làm việc ngân hàng'], answer: 1 },
            { question: 'Khái niệm discrepancy trong L/C là:', options: ['Chênh lệch tỷ giá trong hợp đồng', 'Bất hợp lệ/sai biệt của chứng từ so với điều khoản L/C hoặc UCP 600', 'Chậm giao hàng thực tế tại cảng', 'Sai tên tàu trong booking note'], answer: 1 },
            { question: 'Khi bộ chứng từ có discrepancy, issuing bank có quyền:', options: ['Bắt buộc phải thanh toán', 'Từ chối thanh toán hoặc xin ý kiến chấp nhận của applicant theo quy định', 'Tự sửa chứng từ', 'Phạt ngay người thụ hưởng'], answer: 1 },
            { question: 'Theo UCP 600, ngân hàng giao dịch dựa trên:', options: ['Hàng hóa, dịch vụ, hiệu suất thực tế', 'Chứng từ chứ không phải hàng hóa/dịch vụ', 'Kết quả kiểm định của hải quan', 'Báo cáo thị trường'], answer: 1 },
            { question: 'Một chức năng quan trọng của Commercial Invoice trong L/C là:', options: ['Chứng minh quyền sở hữu hàng như B/L theo lệnh', 'Thể hiện yêu cầu thanh toán và mô tả thương mại phù hợp L/C', 'Thay thế chứng từ bảo hiểm', 'Thay thế giấy chứng nhận xuất xứ'], answer: 1 },
            { question: 'Chứng từ nào thường là bằng chứng quan trọng hàng đã xếp lên tàu?', options: ['Packing List', 'Bill of Lading (B/L)', 'Certificate of Origin', 'Sales Contract'], answer: 1 },
            { question: 'Theo UCP 600 Điều 28, chứng từ bảo hiểm tối thiểu thường phải ở mức:', options: ['100% trị giá hóa đơn', '105% trị giá hóa đơn', '110% trị giá hóa đơn', '120% trị giá hóa đơn'], answer: 2 },
            { question: 'Chứng từ bảo hiểm nào không được chấp nhận theo Điều 28 UCP 600?', options: ['Insurance Policy', 'Insurance Certificate', 'Cover Note', 'Declaration under open cover'], answer: 2 },
            { question: 'Nếu L/C yêu cầu clean on board B/L, hiểu đúng là:', options: ['B/L có thể có ghi chú bất lợi miễn người mua đồng ý', 'B/L thể hiện hàng đã xếp lên tàu và không có ghi chú bất lợi', 'Chỉ cần bản copy B/L', 'Chỉ cần booking confirmation'], answer: 1 },
            { question: 'Khi L/C cấm chuyển tải nhưng B/L thể hiện có transshipment, khả năng là:', options: ['Không ảnh hưởng', 'Bất hợp lệ/sai biệt chứng từ', 'Tự động được miễn trừ', 'Chỉ ảnh hưởng phí vận tải'], answer: 1 },
            { question: 'Latest shipment date trong L/C có ý nghĩa:', options: ['Ngày lập hóa đơn', 'Hạn cuối cùng hàng phải được giao/xếp theo điều kiện L/C', 'Ngày hết hiệu lực bảo hiểm', 'Ngày nộp thuế nhập khẩu'], answer: 1 },
            { question: 'Nếu ngày shipped on board muộn hơn latest shipment date:', options: ['Vẫn phù hợp nếu trị giá đúng', 'Là sai biệt nghiêm trọng về thời hạn giao hàng', 'Được bỏ qua mặc định', 'Chỉ cần sửa invoice'], answer: 1 },
            { question: 'Theo ISBP 745, dữ liệu giữa các chứng từ phải:', options: ['Giống từng ký tự tuyệt đối mọi nơi', 'Không mâu thuẫn trọng yếu (not to conflict)', 'Chỉ cần khớp trên hóa đơn', 'Có thể mâu thuẫn nếu người bán giải trình'], answer: 1 },
            { question: 'Vai trò của ISBP 745 là:', options: ['Thay thế UCP 600', 'Hướng dẫn thực hành kiểm tra chứng từ khi áp dụng UCP 600', 'Quy định biểu thuế hải quan', 'Quy định Incoterms'], answer: 1 },
            { question: 'L/C at sight có nghĩa là:', options: ['Thanh toán sau 60 ngày kể từ ngày chấp nhận', 'Thanh toán khi xuất trình chứng từ phù hợp theo quy định', 'Chỉ thanh toán sau khi hàng bán hết', 'Chỉ dùng cho dịch vụ'], answer: 1 },
            { question: 'L/C usance (deferred/usance) thường là:', options: ['Trả tiền ngay tại thời điểm xuất trình', 'Trả tiền tại thời điểm tương lai theo kỳ hạn quy định', 'Không cần chứng từ vận tải', 'Không thể chiết khấu'], answer: 1 },
            { question: 'Mục tiêu chính của việc soạn L/C chi tiết là:', options: ['Tăng số lượng chứng từ không cần thiết', 'Giảm mơ hồ, hạn chế tranh chấp và sai biệt chứng từ', 'Chỉ để tăng phí ngân hàng', 'Thay thế hợp đồng ngoại thương'], answer: 1 },
            { question: 'Nếu điều kiện Incoterms trong invoice khác nội dung L/C, đây thường là:', options: ['Không quan trọng', 'Sai biệt có thể dẫn đến từ chối thanh toán', 'Tự động điều chỉnh theo hợp đồng', 'Chỉ ảnh hưởng người vận tải'], answer: 1 },
            { question: 'Chọn nhận định đúng về trách nhiệm ngân hàng trong L/C:', options: ['Ngân hàng chịu trách nhiệm chất lượng hàng', 'Ngân hàng không chịu trách nhiệm chất lượng hàng, chỉ xử lý chứng từ', 'Ngân hàng chịu trách nhiệm mọi tranh chấp thương mại', 'Ngân hàng chịu trách nhiệm biến động giá hàng'], answer: 1 },
            { question: 'Trong bộ chứng từ L/C, việc thiếu một bản gốc khi L/C yêu cầu full set có thể bị coi là:', options: ['Không vấn đề', 'Discrepancy', 'Chỉ là lỗi kỹ thuật nhỏ luôn bỏ qua', 'Tự động chấp nhận nếu có bản scan'], answer: 1 },

            { question: 'Waiver of discrepancies trong thực tế là:', options: ['Ngân hàng tự miễn sai biệt không cần applicant', 'Applicant chấp nhận các sai biệt để ngân hàng vẫn thanh toán theo quyết định của họ', 'Người bán tự tuyên bố miễn sai biệt', 'Cơ quan hải quan miễn thuế'], answer: 1 },
            { question: 'Tình huống: L/C yêu cầu Invoice mô tả 1,000 pcs brand new, nhưng invoice ghi 1,050 pcs và không có brand new. Đánh giá đúng là:', options: ['Phù hợp vì cùng loại hàng', 'Sai biệt về số lượng và mô tả hàng', 'Chỉ sai khi người mua khiếu nại', 'Không ảnh hưởng nếu tổng tiền đúng'], answer: 1 },
            { question: 'Tình huống: L/C yêu cầu Insurance Certificate 110% Invoice Value, ICC (A). Chứng từ xuất trình 100% và ICC (C). Đây là:', options: ['Phù hợp vì vẫn có bảo hiểm', 'Sai biệt về cả mức bảo hiểm và phạm vi rủi ro', 'Chỉ sai về hình thức', 'Không cần kiểm tra theo UCP'], answer: 1 },
            { question: 'Tình huống: L/C yêu cầu 3/3 original B/L, bộ chứng từ chỉ nộp 2/3. Kết luận phù hợp nhất:', options: ['Có thể chấp nhận vì đã có đa số', 'Sai biệt do không đủ full set theo yêu cầu', 'Tự động thay bằng telex release', 'Chỉ sai khi hàng chưa cập cảng'], answer: 1 },
            { question: 'Tình huống: L/C cấm transshipment, nhưng B/L có ghi chú chuyển tải tại cảng trung chuyển. Đây là:', options: ['Không ảnh hưởng', 'Discrepancy vì mâu thuẫn điều kiện L/C', 'Được chấp nhận mặc định theo ISBP', 'Chỉ ảnh hưởng bảo hiểm'], answer: 1 },
            { question: 'Tình huống: Ngày shipment trên B/L là 20/07, trong khi latest shipment date là 15/07. Nhận định đúng:', options: ['Có thể bỏ qua nếu người mua chưa khiếu nại', 'Sai biệt giao hàng trễ hạn', 'Chỉ cần sửa packing list', 'Không liên quan thanh toán L/C'], answer: 1 },
            { question: 'Tình huống: L/C quy định chứng từ phải xuất trình trong vòng 21 ngày từ ngày shipment, nhưng doanh nghiệp nộp ngày thứ 28. Đây là:', options: ['Luôn được chấp nhận', 'Sai biệt về thời hạn xuất trình', 'Chỉ ảnh hưởng phí', 'Không ảnh hưởng nếu chứng từ đầy đủ'], answer: 1 },
            { question: 'Tình huống: Applicant yêu cầu sửa L/C, nhưng Beneficiary chưa chấp nhận amendment. Trạng thái amendment là:', options: ['Tự động có hiệu lực', 'Chưa ràng buộc Beneficiary cho đến khi được chấp nhận theo nguyên tắc áp dụng', 'Vẫn có hiệu lực bắt buộc với mọi bên', 'Do Advising Bank tự quyết'], answer: 1 },
            { question: 'Tình huống: Bộ chứng từ có discrepancy, applicant đồng ý waiver bằng văn bản. Ngân hàng phát hành có thể:', options: ['Vẫn từ chối trong mọi trường hợp', 'Thanh toán/chấp nhận theo quyết định xử lý sau khi có waiver phù hợp', 'Tự động chuyển thành D/P', 'Yêu cầu hủy toàn bộ hợp đồng'], answer: 1 },
            { question: 'Tình huống: Người bán giao đúng hàng thực tế nhưng chứng từ sai điều kiện L/C. Theo nguyên tắc L/C:', options: ['Ngân hàng phải thanh toán vì hàng đúng', 'Ngân hàng có thể từ chối vì giao dịch dựa trên chứng từ', 'Ngân hàng phải đi kiểm tra hàng', 'Không cần sửa chứng từ'], answer: 1 },
            { question: 'Tình huống: Advising Bank thông báo L/C giả mạo do không xác thực điện SWIFT đúng quy trình. Rủi ro chính phản ánh tầm quan trọng của:', options: ['Nguyên tắc độc lập', 'Quy trình xác thực tính chân thực của thông điệp L/C', 'Điều kiện Incoterms', 'Chứng từ bảo hiểm'], answer: 1 },
            { question: 'Tình huống: Confirming Bank đã xác nhận L/C và chứng từ xuất trình phù hợp, nhưng issuing bank mất khả năng thanh toán. Nhận định đúng là:', options: ['Beneficiary không được trả tiền', 'Confirming Bank vẫn phải thực hiện cam kết thanh toán theo xác nhận của mình', 'Applicant phải trả trực tiếp cho Beneficiary trước', 'Advising Bank phải trả thay'], answer: 1 },
            { question: 'Tình huống: L/C yêu cầu tất cả chứng từ bằng tiếng Anh, nhưng C/O nộp bằng ngôn ngữ khác không có bản dịch theo yêu cầu. Khả năng cao:', options: ['Vẫn phù hợp', 'Có thể bị nêu sai biệt vì không đáp ứng điều kiện L/C', 'Tự động hợp lệ nếu có dấu đỏ', 'Không liên quan đến ngân hàng'], answer: 1 },
            { question: 'Tình huống: Doanh nghiệp muốn giảm sai biệt chứng từ lặp lại nhiều lần. Biện pháp phù hợp nhất là:', options: ['Nộp chứng từ sớm hơn nhưng không kiểm tra', 'Thiết lập checklist chứng từ theo từng field L/C và rà soát nội bộ trước xuất trình', 'Chỉ dựa vào kinh nghiệm cá nhân', 'Bỏ qua ISBP 745'], answer: 1 },
            { question: 'Tình huống: Một bất hợp lệ nhỏ được phát hiện sớm trước khi xuất trình trong khi còn thời gian. Hành động tối ưu cho Beneficiary là:', options: ['Xuất trình ngay để thử vận may', 'Sửa chứng từ cho phù hợp hoặc xin amendment trước khi xuất trình', 'Hủy lô hàng', 'Chờ applicant liên hệ trước'], answer: 1 },
            { question: 'Tình huống: Giao dịch với đối tác mới, thị trường rủi ro cao, người bán muốn tăng chắc chắn thu tiền. Phương án phù hợp hơn là:', options: ['D/A dài ngày', 'L/C không hủy ngang có xác nhận (khi cần) và kiểm soát chặt chứng từ', 'Ghi sổ không bảo đảm', 'Chuyển tiền trả sau toàn bộ'], answer: 1 }
        ];

        let userAnswers = [];

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';

            quizData.forEach((item, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.id = `question-${index}`;

                const numberDiv = document.createElement('div');
                numberDiv.className = 'question-number';
                numberDiv.textContent = `Câu ${index + 1}`;

                const textDiv = document.createElement('div');
                textDiv.className = 'question-text';
                textDiv.textContent = item.question;

                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'options-container';

                const labels = ['A', 'B', 'C', 'D'];
                item.options.forEach((option, optionIndex) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = labels[optionIndex] + '. ' + option;
                    btn.onclick = () => selectAnswer(index, optionIndex);
                    btn.id = `option-${index}-${optionIndex}`;
                    optionsDiv.appendChild(btn);
                });

                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback';
                feedbackDiv.id = `feedback-${index}`;

                questionDiv.appendChild(numberDiv);
                questionDiv.appendChild(textDiv);
                questionDiv.appendChild(optionsDiv);
                questionDiv.appendChild(feedbackDiv);

                container.appendChild(questionDiv);
            });
        }

        function selectAnswer(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;

            ['A', 'B', 'C', 'D'].forEach((_, i) => {
                const btn = document.getElementById(`option-${questionIndex}-${i}`);
                if (btn) {
                    if (i === optionIndex) {
                        btn.classList.add('selected');
                    } else {
                        btn.classList.remove('selected');
                    }
                }
            });

            document.getElementById(`question-${questionIndex}`).classList.add('answered');
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(ans => ans !== undefined).length;
            const total = quizData.length;
            const percent = Math.round((answered / total) * 100);

            document.getElementById('current-question').textContent = answered;
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        function submitQuiz() {
            let correct = 0;
            let incorrect = 0;

            quizData.forEach((item, index) => {
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                const questionItem = document.getElementById(`question-${index}`);
                const labels = ['A', 'B', 'C', 'D'];
                const isCorrect = userAnswers[index] === item.answer;

                if (isCorrect) {
                    correct++;
                    const btn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (btn) btn.classList.add('correct');
                    feedbackDiv.className = 'feedback show correct';
                    feedbackDiv.textContent = 'Chính xác!';
                } else {
                    incorrect++;
                    const userBtn = document.getElementById(`option-${index}-${userAnswers[index]}`);
                    if (userBtn) userBtn.classList.add('incorrect');
                    const correctBtn = document.getElementById(`option-${index}-${item.answer}`);
                    if (correctBtn) correctBtn.classList.add('correct');
                    feedbackDiv.className = 'feedback show incorrect';
                    feedbackDiv.textContent = `Sai! Đáp án đúng là: ${labels[item.answer]}`;
                    questionItem.classList.add('incorrect');
                }
            });

            const percentage = Math.round((correct / quizData.length) * 100);
            document.getElementById('correct-count').textContent = correct;
            document.getElementById('incorrect-count').textContent = incorrect;
            document.getElementById('percentage').textContent = percentage + '%';

            showResults(correct, percentage);
        }

        function showResults(correct, percentage) {
            const resultsContainer = document.getElementById('results-container');
            const scoreCircle = document.getElementById('score-circle');
            const resultsMessage = document.getElementById('results-message');
            const resultsDetails = document.getElementById('results-details');
            const wrongAnswers = document.getElementById('wrong-answers');
            const labels = ['A', 'B', 'C', 'D'];

            scoreCircle.textContent = correct + '/' + quizData.length;

            if (percentage >= 90) {
                scoreCircle.className = 'score-circle excellent';
                resultsMessage.textContent = 'Xuất sắc!';
            } else if (percentage >= 70) {
                scoreCircle.className = 'score-circle good';
                resultsMessage.textContent = 'Tốt lắm!';
            } else if (percentage >= 50) {
                scoreCircle.className = 'score-circle fair';
                resultsMessage.textContent = 'Cần cố gắng thêm!';
            } else {
                scoreCircle.className = 'score-circle poor';
                resultsMessage.textContent = 'Cần ôn luyện thêm!';
            }

            resultsDetails.innerHTML = `<p>Bạn trả lời đúng <strong>${correct}</strong> trên <strong>${quizData.length}</strong> câu (${percentage}%)</p>`;

            const wrongList = [];
            quizData.forEach((item, index) => {
                const userAnswer = userAnswers[index];
                if (userAnswer !== item.answer) {
                    const selected = userAnswer !== undefined
                        ? `${labels[userAnswer]} - ${item.options[userAnswer]}`
                        : 'Chưa chọn';

                    wrongList.push(`
                        <div class="wrong-item">
                            <div><strong>Câu ${index + 1}:</strong> ${item.question}</div>
                            <div>Bạn chọn: <strong>${selected}</strong></div>
                            <div>Đáp án đúng: <strong>${labels[item.answer]}</strong> - ${item.options[item.answer]}</div>
                        </div>
                    `);
                }
            });

            if (wrongList.length > 0) {
                wrongAnswers.style.display = 'block';
                wrongAnswers.innerHTML = `<h3>Các câu sai (${wrongList.length})</h3>${wrongList.join('')}`;
            } else {
                wrongAnswers.style.display = 'none';
                wrongAnswers.innerHTML = '';
            }

            resultsContainer.classList.add('show');
            document.getElementById('quiz-container').style.display = 'none';
        }

        function resetQuiz() {
            userAnswers = [];

            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('results-container').classList.remove('show');

            document.getElementById('current-question').textContent = '0';
            document.getElementById('correct-count').textContent = '0';
            document.getElementById('incorrect-count').textContent = '0';
            document.getElementById('percentage').textContent = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('wrong-answers').style.display = 'none';
            document.getElementById('wrong-answers').innerHTML = '';

            renderQuiz();
        }

        window.addEventListener('load', renderQuiz);
    </script>
